<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
<title>be-conductor agent</title>
<style>
:root {
    --bg: #0d0d1a;
    --fg: #e0e0e0;
    --bg-secondary: #161b22;
    --border: #30363d;
    --accent: #4a6cf7;
    --success: #3fb950;
    --error: #f85149;
    --muted: #8b949e;
    --code-bg: #0d1117;
    --user-bg: #1c2240;
    --tool-bg: #0d1117;
    --tool-header: #161b22;
    --success-bg: #0d1a0d;
    --error-bg: #1a0d0d;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-mono: 'JetBrains Mono', 'Cascadia Mono', Menlo, Consolas, monospace;
}
*, *::before, *::after { box-sizing: border-box; }
html { height: 100%; overflow: hidden; }
body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font); font-size: 14px; position: fixed; top: 0; left: 0; right: 0; bottom: 0; overflow: hidden; overscroll-behavior: none; display: flex; flex-direction: column; }
#messages { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px 16px 12px 16px; min-height: 0; position: relative; word-wrap: break-word; overflow-wrap: break-word; overflow-anchor: none; }
#input-area { overflow-anchor: none; }
#last-msg-bar:hover { background: #7a8294 !important; }
#msg-nav { display: flex; gap: 2px; padding: 4px; }
@keyframes nav-blink { 0%,100% { opacity:0.4; } 50% { opacity:1; background:var(--accent); color:white; border-radius:5px; } }
#msg-nav button { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 5px; width: 22px; height: 22px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--muted); transition: opacity 0.15s, background 0.15s; }
#msg-nav button:hover:not(:disabled) { background: var(--border); opacity: 1 !important; }
#msg-nav button:disabled { cursor: default; }
#drag-handle { height: 4px; cursor: row-resize; background: transparent; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
#drag-handle div { width: 24px; height: 2px; background: var(--border); border-radius: 1px; opacity: 0.4; }
#drag-handle:hover div { opacity: 0.8; }
#input-area { flex-shrink: 0; background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 8px 12px; position: relative; }
#input-box { display: flex; flex-direction: column; background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; padding: 0; transition: border-color 0.2s; }
#input-box:focus-within { border-color: var(--mode-color, var(--border)); }
#input-toolbar { display: flex; align-items: center; gap: 0; padding: 2px 4px; border-top: 1px solid var(--border); border-radius: 0 0 10px 10px; }
#prompt { width: 100%; resize: none; background: transparent; color: var(--fg); border: none; outline: none; padding: 8px 12px; font-family: inherit; font-size: 13px; min-height: 38px; max-height: 200px; line-height: 1.4; overflow-y: auto; }
.attach-btn, .mode-btn, .send-btn { flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.attach-btn { background: none; border: none; color: var(--muted); padding: 6px; border-radius: 6px; }
.attach-btn:hover { color: var(--fg); background: #1a1f2b; }
.mode-btn { background: none; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 11px; gap: 4px; white-space: nowrap; position: relative; }
.mode-btn:hover { color: var(--fg); border-color: #666; }
.send-btn { background: #2563eb; color: white; border: none; border-radius: 6px; width: 32px; height: 28px; padding: 4px 0; transition: background 0.15s, opacity 0.15s; }
.send-btn:hover { background: #3b82f6; }
.send-btn.busy { background: #1a1a1a; border: 1px solid #444; }
.send-btn.busy:hover { background: #2a2a2a; }
.send-btn.queued { background: #b45309; }
.send-btn.queued:hover { background: #d97706; }
.send-btn.disabled { background: #333; opacity: 0.4; cursor: default; }
.send-btn.disabled:hover { background: #333; }
.agent-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--muted); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.spinner-verb { background: linear-gradient(90deg, #8b949e 0%, #8b949e 40%, #e0e0e0 50%, #8b949e 60%, #8b949e 100%); background-size: 200% 100%; -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 2.5s ease-in-out infinite; }
@keyframes shimmer { 0%,100% { background-position: 100% 0; } 50% { background-position: 0% 0; } }
.right-group { display: flex; align-items: center; gap: 4px; flex-shrink: 0; position: relative; }
.mode-popup { display: none; position: absolute; bottom: 100%; right: 0; margin-bottom: 8px; background: #1c2028; border: 1px solid var(--border); border-radius: 10px; padding: 8px 0; min-width: 300px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.slash-popup { display: none; position: absolute; bottom: 100%; left: 0; right: 0; margin-bottom: 4px; background: #1c2028; border: 1px solid var(--border); border-radius: 10px; padding: 6px 0; z-index: 150; box-shadow: 0 8px 24px rgba(0,0,0,0.5); max-height: 360px; overflow-y: auto; }
.slash-popup.open { display: block; }
.slash-section { padding: 6px 14px 2px; font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.slash-item { padding: 7px 14px; cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--fg); }
.slash-item:hover, .slash-item.selected { background: #2a2f3a; }
.slash-item .slash-desc { color: var(--muted); font-size: 12px; margin-left: auto; }
.btw-panel { display: none; background: #1c1206; border: 2px solid #e67e22; border-radius: 8px; padding: 14px 16px; margin: 0 8px 4px 8px; flex-shrink: 0; max-height: 40vh; overflow-y: auto; box-sizing: border-box; }
.btw-panel.open { display: block; animation: btwSlideUp 0.2s ease-out; }
.btw-panel .btw-header { display: flex; align-items: center; margin-bottom: 10px; }
.btw-panel .btw-label { font-size: 12px; color: #f39c12; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
.btw-panel .btw-close { margin-left: auto; background: none; border: none; color: #e67e22; font-size: 18px; cursor: pointer; padding: 2px 6px; border-radius: 4px; line-height: 1; }
.btw-panel .btw-close:hover { color: #f5b041; background: rgba(230,126,34,0.2); }
.btw-panel .btw-question { font-size: 13px; color: #f0d0a0; padding: 8px 12px; background: rgba(230,126,34,0.1); border-radius: 6px; border-left: 3px solid #e67e22; line-height: 1.5; margin-bottom: 10px; }
.btw-panel .btw-waiting { font-size: 12px; color: #c89040; display: flex; align-items: center; gap: 8px; }
.btw-panel .btw-response { font-size: 13px; color: #e0d0b0; line-height: 1.6; padding: 8px 12px; background: rgba(230,126,34,0.06); border-radius: 6px; margin-top: 8px; }
.btw-panel .btw-response strong { color: #f0e0c0; }
@keyframes btwSlideUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
.mode-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; }
.mode-item:hover { background: #2a2f3a; }
.mode-item.active { background: #1a2744; }
/* Effort slider — inline pill with a blue fill from the left to the
   active step, dimmer dots at each remaining step, and a white handle
   ball riding the fill's leading edge. Entire pill is clickable; each
   dot is its own click target via absolute positioning. No text labels
   below — the parent row label shows the current effort in words. */
.effort-slider { position: relative; width: 100px; height: 18px; user-select: none; flex-shrink: 0; cursor: pointer; }
.effort-slider-track { position: absolute; left: 0; right: 0; top: 50%; transform: translateY(-50%); height: 12px; background: rgba(255,255,255,0.08); border-radius: 999px; overflow: hidden; }
.effort-slider-fill  { position: absolute; inset: 0 auto 0 0; background: #2563eb; border-radius: 999px; transition: width 0.15s ease; }
.effort-slider-dots  { position: absolute; inset: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 6px; pointer-events: none; }
.effort-slider-dot   { width: 4px; height: 4px; border-radius: 50%; background: rgba(255,255,255,0.45); pointer-events: auto; cursor: pointer; }
.effort-slider-dot.filled { background: rgba(255,255,255,0.85); }
.effort-slider-handle { position: absolute; top: 50%; width: 14px; height: 14px; border-radius: 50%; background: #e8e8e8; box-shadow: 0 1px 2px rgba(0,0,0,0.4); transform: translate(-50%, -50%); transition: left 0.15s ease; pointer-events: none; }
.attachment-preview { display: none; gap: 6px; padding: 4px 8px; flex-shrink: 0; overflow-x: auto; flex-wrap: wrap; }
.drag-over #input-box { border-color: #4a6cf7 !important; background: #1a2744 !important; }
.drag-over::after { content: 'Drop files here'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(26,39,68,0.9); color: #4a6cf7; font-size: 14px; font-weight: 500; border-radius: 10px; pointer-events: none; z-index: 10; }
.attachment-item { position: relative; display: flex; align-items: center; gap: 4px; padding: 4px 8px; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; font-size: 11px; color: #a0a0d0; }
.attachment-item img { max-height: 40px; max-width: 60px; border-radius: 3px; object-fit: cover; }
.attachment-item .remove-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
.attachment-item .remove-btn:hover { color: #ff6666; }
/* Annotation editor */
.annotate-overlay { position:fixed; inset:0; z-index:2000; background:var(--bg); display:flex; flex-direction:column; touch-action:none; }
.annotate-toolbar { display:flex; align-items:center; gap:6px; padding:8px 12px; border-bottom:1px solid var(--border); flex-shrink:0; flex-wrap:wrap; }
.annotate-toolbar button { background:var(--code-bg); border:1px solid var(--border); border-radius:4px; padding:5px 10px; color:var(--muted); font-size:12px; cursor:pointer; white-space:nowrap; }
.annotate-toolbar button:hover { border-color:#666; color:var(--fg); }
.annotate-toolbar button.active { border-color:var(--accent); color:var(--fg); background:var(--tool-header); }
.annotate-toolbar .color-dot { width:20px; height:20px; border-radius:50%; border:2px solid #555; cursor:pointer; flex-shrink:0; }
.annotate-toolbar .color-dot.active { border-color:white; box-shadow:0 0 4px rgba(255,255,255,0.5); }
.annotate-toolbar .sep { width:1px; height:20px; background:var(--border); flex-shrink:0; }
.annotate-canvas-wrap { flex:1; overflow:auto; display:flex; align-items:center; justify-content:center; min-height:0; position:relative; }
.annotate-canvas-wrap canvas { cursor:crosshair; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
.file-link { color: var(--accent); text-decoration: none; }
.file-link:hover { text-decoration: underline; }
/* Context indicator */
.context-indicator { cursor: pointer; display: flex; align-items: center; padding: 2px; border-radius: 4px; }
.context-indicator:hover { background: var(--border); }
/* Message layout */
.msg { margin: 0; }
.msg-user { margin-top: 16px; }
.msg-group { position: relative; margin-left: 8px; padding-left: 20px; padding-top: 4px; }
.msg-group:empty { display: none; }
.msg-group::before { content: ''; position: absolute; left: 3px; top: var(--line-top, 14px); height: var(--line-height, 0); width: 1px; background: var(--muted); opacity: 0.35; }
.msg-group.single-dot::before { display: none; }
.msg-claude { padding-top: 4px; padding-bottom: 4px; }
.msg-claude-dot { position: relative; margin-left: 8px; padding-left: 20px; }
.msg-claude-dot::before { content: ''; position: absolute; left: 3px; top: var(--dot-top, calc(0.8em - 1px)); width: 7px; height: 7px; border-radius: 50%; background: var(--muted); opacity: 0.7; z-index: 1; box-shadow: 0 0 0 3px var(--bg); }
.msg-claude-dot .dot-line { position: absolute; left: 6px; width: 1px; background: var(--muted); opacity: 0.35; z-index: 0; }
summary[style*="list-style:none"]::-webkit-details-marker { display: none; }
.msg-group[data-queued-group] { opacity: 0.4; }
.msg-group[data-queued-group]::before { display: none; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: #484f58; }
::-webkit-scrollbar-corner { background: transparent; }
.search-hit { background: rgba(255,200,0,0.25); border-radius: 2px; }
.search-hit-active { background: rgba(255,200,0,0.7); outline: 1px solid #f0c040; border-radius: 2px; }
.msg-skeleton { opacity: 0.5; }
</style>
</head>
<body>

<div id="messages-wrap" style="flex:1;min-height:0;position:relative;display:flex;flex-direction:column;">
<div id="last-msg-bar" style="display:none;position:absolute;top:0;left:0;right:0;z-index:50;background:#8890a0;border-bottom:1px solid #6a7080;padding:6px 12px;font-size:12px;cursor:pointer;align-items:flex-start;gap:8px;">
    <span id="last-msg-text" style="flex:1;color:#1a1a2e;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;line-height:1.4;font-weight:500;min-width:0;"></span>
    <button id="last-msg-expand" style="display:none;background:none;border:none;color:#4a6cf7;font-size:11px;cursor:pointer;padding:0;flex-shrink:0;white-space:nowrap;margin-top:1px;">more &#9662;</button>
    <button id="last-msg-close" style="background:none;border:none;color:#1a1a2e;font-size:18px;font-weight:bold;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0;">&times;</button>
</div>
<div id="msg-nav" style="position:absolute;bottom:8px;right:12px;z-index:50;">
    <button id="nav-up" title="Previous question" disabled style="opacity:0.25;">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M2 7l4-4 4 4"/></svg>
    </button>
    <button id="nav-down" title="Next question" disabled style="opacity:0.25;">
            <svg width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M2 5l4 4 4-4"/></svg>
        </button>
</div>
<div id="search-bar" style="display:none;align-items:center;gap:6px;padding:6px 12px;background:var(--bg-secondary);border-bottom:1px solid var(--border);flex-shrink:0;">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="var(--muted)" stroke-width="1.5"><circle cx="6.5" cy="6.5" r="5"/><path d="M10.5 10.5L14 14"/></svg>
    <input id="search-input" type="text" placeholder="Find in conversation..." style="flex:1;background:var(--code-bg);color:var(--fg);border:1px solid var(--border);border-radius:4px;padding:4px 8px;font-size:13px;outline:none;min-width:0;" />
    <span id="search-count" style="font-size:11px;color:var(--muted);white-space:nowrap;">0/0</span>
    <button id="search-prev" title="Previous (Shift+Enter)" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;padding:2px 6px;font-size:12px;line-height:1;">&#9650;</button>
    <button id="search-next" title="Next (Enter)" style="background:none;border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;padding:2px 6px;font-size:12px;line-height:1;">&#9660;</button>
    <button id="search-close" title="Close (Esc)" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 4px;line-height:1;">&times;</button>
</div>
<div id="messages" style="flex:1;width:100%;contain:layout style;">
</div>
</div>
<div class="btw-panel" id="btw-panel"></div>
<div id="drag-handle"><div></div></div>
<div id="input-area">
    <div class="slash-popup" id="slash-popup"></div>
    <div class="attachment-preview" id="attach-preview"></div>
    <div id="input-box">
        <textarea id="prompt" rows="1" placeholder="Message Claude..."></textarea>
        <div id="input-toolbar">
            <button class="attach-btn" id="attach-btn" title="Attach file or image">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/></svg>
            </button>
            <button class="attach-btn" id="slash-btn" title="Commands">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M10 3L6 13"/></svg>
            </button>
            <div class="context-indicator" id="context-indicator" title="Context window usage" style="gap:4px;">
                <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="var(--border)" stroke-width="2"/><circle cx="8" cy="8" r="6" fill="none" stroke="var(--muted)" stroke-width="2" stroke-dasharray="37.7" stroke-dashoffset="37.7" id="context-ring" transform="rotate(-90 8 8)"/></svg>
                <span id="context-label" style="font-size:10px;color:var(--muted);white-space:nowrap;"></span>
            </div>
            <div style="flex:1;"></div>
            <div class="right-group" id="right-group">
                <div class="mode-popup" id="mode-popup"></div>
                <button class="mode-btn" id="mode-btn" title="Modes &amp; Effort"></button>
                <button id="settings-btn" style="background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;align-items:center;border-radius:4px;" title="Settings">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><circle cx="8" cy="3" r="1"/><circle cx="8" cy="8" r="1"/><circle cx="8" cy="13" r="1"/></svg>
                </button>
                <div id="settings-popup" style="display:none;position:fixed;background:var(--bg-secondary);border:1px solid var(--border);border-radius:8px;min-width:200px;padding:6px 0;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.4);">
                </div>
                <button class="send-btn" id="send-btn" title="Send (Enter)"></button>
            </div>
        </div>
    </div>
</div>
<input type="file" id="file-input" multiple style="display:none" accept="image/*,.txt,.csv,.json,.md,.py,.js,.ts,.html,.css,.xml,.yaml,.yml,.toml,.sh,.log">

<script>
// --- Configuration ---
const params = new URLSearchParams(location.search);
let SESSION_ID = params.get('session') || window.__SESSION_ID || '';
const WS_BASE = params.get('ws') || window.__WS_BASE || location.origin.replace(/^http/, 'ws');

// Client-side WS trace. Mirror of the server's BC_WS_TRACE. Enable by
// appending ?trace=1 (or trace=ws) to the agent-view URL. When on, every
// incoming WS event logs: arrival time, parse time, render time, and
// for assistant_message / result / stream_stop, the gap between arrival
// and paint. Compared against the server's [ws-trace] log lines this
// tells us whether the browser received the event late (WS stalled), on
// time but rendered slow (main-thread backpressure), or rendered fast
// but didn't paint (browser-level issue). Off by default; when off the
// only cost is a boolean test per event.
const _TRACE_WS = params.get('trace') === '1' || params.get('trace') === 'ws';
const _TRACE_T0 = performance.now();
function _wsTrace(tag, event, extra) {
    if (!_TRACE_WS) return;
    var ms = Math.round(performance.now() - _TRACE_T0);
    var t = event && event.type ? event.type : '?';
    // Keep messages compact so long sessions don't drown the console.
    console.log('[ws-trace] ' + String(ms).padStart(8) + 'ms ' + tag.padEnd(6) + ' type=' + t + (extra ? ' ' + extra : ''));
}

// --- Theme ---
const THEMES = {
    default: {
        bg: '#12122a', fg: '#d0d0e0', secondary: '#1a1a3a', border: '#2a2a5a',
        accent: '#7c8cff', muted: '#8888bb', codeBg: '#0a0a20',
        userBg: '#1a1a44', toolBg: '#141430', toolHeader: '#1a1a3a',
        successBg: '#0a1a0a', errorBg: '#1a0a0a',
    },
    dark: {
        bg: '#0a0a0a', fg: '#c8c8c8', secondary: '#141414', border: '#2a2a2a',
        accent: '#6699dd', muted: '#777777', codeBg: '#060606',
        userBg: '#111122', toolBg: '#0e0e0e', toolHeader: '#161616',
        successBg: '#0a120a', errorBg: '#120a0a',
    },
    mid: {
        bg: '#1e1e2e', fg: '#cdd6f4', secondary: '#262640', border: '#45475a',
        accent: '#89b4fa', muted: '#a6adc8', codeBg: '#181825',
        userBg: '#232345', toolBg: '#1c1c30', toolHeader: '#262640',
        successBg: '#1a2a1a', errorBg: '#2a1a1a',
    },
    bright: {
        bg: '#ffffff', fg: '#24292f', secondary: '#f6f8fa', border: '#d0d7de',
        accent: '#0969da', muted: '#656d76', codeBg: '#f0f2f5',
        userBg: '#ddf4ff', toolBg: '#f6f8fa', toolHeader: '#eaeef2',
        successBg: '#dafbe1', errorBg: '#ffebe9',
    },
    bernstein: {
        bg: '#1a0e00', fg: '#ffb000', secondary: '#241400', border: '#4a2800',
        accent: '#ffc040', muted: '#996600', codeBg: '#120800',
        userBg: '#241800', toolBg: '#1e1000', toolHeader: '#2a1800',
        successBg: '#1a1400', errorBg: '#1a0800',
    },
    green: {
        bg: '#001a00', fg: '#33ff00', secondary: '#002200', border: '#0a4400',
        accent: '#44ff22', muted: '#1a8800', codeBg: '#001200',
        userBg: '#002800', toolBg: '#001e00', toolHeader: '#003000',
        successBg: '#002a00', errorBg: '#1a0a00',
    },
};
const root = document.documentElement;
function applyTheme(t) {
    root.style.setProperty('--bg', t.bg);
    root.style.setProperty('--fg', t.fg);
    root.style.setProperty('--bg-secondary', t.secondary);

    if (!usage) return;
    // Don't update during history replay — the per-message usage is
    // stale and can make the ring jump wildly. We request fresh context
    // usage from the SDK after replay finishes.
    if (_replayingHistory) return;
    // If we have real context_usage data from the SDK, don't let
    // per-turn usage override it (per-turn double-counts cache reads)
    if (_hasContextUsageEvent) return;
    const input = Number(usage.input_tokens || usage.inputTokens || 0);
    const output = Number(usage.output_tokens || usage.outputTokens || 0);
    const cacheRead = Number(usage.cache_read_input_tokens || usage.cacheReadInputTokens || 0);
    const cacheCreate = Number(usage.cache_creation_input_tokens || 0);
    // Context = input + cache_read + cache_creation (all input the model sees).
    // Output tokens are the model's response, not context.
    const newTotal = input + cacheRead + cacheCreate;
    // Skip zero-usage updates — keeps the last known value visible
    // instead of misleadingly showing 0K during compact or internal SDK calls.
    if (newTotal === 0 && totalTokens > 0) return;
    totalTokens = newTotal;
    const cache = cacheRead + cacheCreate;
    // Accumulate session stats
    _stats.totalInput += input;
    _stats.totalOutput += output;
    _stats.totalCacheRead += cacheRead;
    _stats.totalCacheCreate += cacheCreate;
    _stats.lastUsage = {input, output, cacheRead, cacheCreate};
    const pct = Math.min(1, totalTokens / MAX_CONTEXT);
    const circumference = 37.7;
    const offset = circumference * (1 - pct);
    if (contextRing) {
        contextRing.style.strokeDashoffset = offset;
        const color = pct < 0.5 ? 'var(--success)' : pct < 0.8 ? '#c4a000' : pct < 0.95 ? '#f0a020' : 'var(--error)';
        contextRing.style.stroke = color;
    }
    const k = (totalTokens / 1000).toFixed(0);
    const pctStr = (pct * 100).toFixed(0);
    if (contextIndicator) {
        contextIndicator.title = `Context: ${k}K / ${MAX_CONTEXT/1000}K tokens (${pctStr}%)${cache ? '\nCache: ' + (cache/1000).toFixed(0) + 'K' : ''}\nClick to compact`;

function _mdToHtml(text) {

        const rows = tableBlock.trim().split('\n').filter(r => r.trim());
        if (rows.length < 2) return tableBlock;
        let html = '<table style="margin:8px 0;border-collapse:collapse;width:100%;font-size:13px;">';
        rows.forEach((row, i) => {
            // Skip separator row (|---|---|)
            if (/^\|[\s-:|]+\|$/.test(row.trim())) return;
            const cells = row.split('|').filter((c, j, a) => j > 0 && j < a.length - 1);
            const tag = i === 0 ? 'th' : 'td';
            const bgStyle = i === 0 ? 'background:var(--tool-header);font-weight:600;' : (i % 2 === 0 ? 'background:var(--code-bg);' : '');

    });
    // Inline code
    h = h.replace(/`([^`]+)`/g, '<code style="background:var(--tool-bg);padding:2px 5px;border-radius:3px;font-size:0.9em;color:var(--fg);">$1</code>');
    // Bold
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Headers
    h = h.replace(/^### (.+)$/gm, '<div style="font-size:15px;font-weight:600;color:var(--fg);margin:12px 0 4px;">$1</div>');
    h = h.replace(/^## (.+)$/gm, '<div style="font-size:16px;font-weight:600;color:var(--fg);margin:14px 0 6px;">$1</div>');
    h = h.replace(/^# (.+)$/gm, '<div style="font-size:18px;font-weight:600;color:var(--fg);margin:16px 0 8px;">$1</div>');

        return '<a href="' + safeUrl + '" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;">' + text + '</a>';
    });
    // Make bare URLs clickable (not already inside a tag)
    h = h.replace(/(?<![="'])(\bhttps?:\/\/[^\s<>&]+)/g, '<a href="$1" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;">$1</a>');
    // Paragraphs
    h = h.replace(/\n\n/g, '<div style="height:8px;"></div>');
    h = h.replace(/\n/g, '<br>');
    // Recover <details>/<summary> tags from model output
    h = h.replace(/&lt;details&gt;/gi, '<details style="margin:8px 0;border:1px solid #30363d;border-radius:6px;overflow:hidden;">');
    h = h.replace(/&lt;\/details&gt;/gi, '</details>');
    h = h.replace(/&lt;summary&gt;([\s\S]*?)&lt;\/summary&gt;/gi, '<summary style="padding:6px 10px;background:var(--tool-header);cursor:pointer;user-select:none;font-size:13px;">$1</summary>');
    // Recover <thinking>...</thinking> blocks from text output and render
    // them as a collapsed Thoughts block matching the regular thinking UI.
    h = h.replace(/&lt;thinking&gt;([\s\S]*?)&lt;\/thinking&gt;/gi, function(_, inner) {
        return '<details style="margin:8px 0;border:1px solid #2d333b;border-radius:6px;overflow:hidden;">' +
            '<summary style="padding:5px 10px;background:#1a1a2e;color:var(--muted);font-size:12px;cursor:pointer;user-select:none;list-style:none;">' +
            '<strong style="color:#a0a0c0;">Thoughts</strong>' +
            '</summary>' +
            '<div style="padding:10px 12px;background:#12121f;max-height:300px;overflow-y:auto;font-size:12px;color:#a0a0c0;line-height:1.5;white-space:pre-wrap;">' +
            inner.trim() +
            '</div></details>';
    });
    // Make file paths clickable
    h = makeFileLinksClickable(h);
    return h;
}

function _computeUnifiedDiff(oldLines, newLines) {
    // Myers-like diff: find longest common subsequence, then output unified
    var m = oldLines.length, n = newLines.length;
    // For large diffs, use a simpler approach
    if (m + n > 2000) {
        var result = [];
        oldLines.forEach(function(l) { result.push({type:'-', text:l}); });
        newLines.forEach(function(l) { result.push({type:'+', text:l}); });
        return result;
    }
    // Build LCS table
    var dp = Array(m + 1);
    for (var i = 0; i <= m; i++) { dp[i] = Array(n + 1).fill(0); }
    for (var i = 1; i <= m; i++) {
        for (var j = 1; j <= n; j++) {
            dp[i][j] = oldLines[i-1] === newLines[j-1] ? dp[i-1][j-1] + 1 : Math.max(dp[i-1][j], dp[i][j-1]);
        }
    }
    // Backtrack to produce diff
    var result = [];
    var i = m, j = n;
    while (i > 0 || j > 0) {
        if (i > 0 && j > 0 && oldLines[i-1] === newLines[j-1]) {
            result.unshift({type:' ', text:oldLines[i-1]});
            i--; j--;
        } else if (j > 0 && (i === 0 || dp[i][j-1] >= dp[i-1][j])) {
            result.unshift({type:'+', text:newLines[j-1]});
            j--;
        } else {
            result.unshift({type:'-', text:oldLines[i-1]});
            i--;
        }
    }
    return result;
}

function _basename(p) { return p ? p.split('/').pop() : ''; }
function _toolInputSummary(name, input) {
    if (!input) return '';
    if (name === 'Bash' && input.command) return input.command;
    if (name === 'Read' && input.file_path) return _basename(input.file_path);
    if (name === 'Write' && input.file_path) return _basename(input.file_path);
    if (name === 'Edit' && input.file_path) return _basename(input.file_path);
    if (name === 'Glob' && input.pattern) return input.pattern;
    if (name === 'Grep' && input.pattern) return input.pattern;
    if (name === 'WebFetch' && input.url) return input.url;
    if (name === 'WebSearch' && input.query) return input.query;
    try { return JSON.stringify(input).slice(0, 120); } catch { return ''; }
}

function _formatToolInput(name, input) {
    if (!input) return '';
    const codeStyle = 'margin:0;font-size:12px;color:var(--muted);white-space:pre-wrap;line-height:1.4;overflow-x:auto;';
    const codeWrap = 'padding:8px 12px;background:var(--code-bg);border-radius:4px;max-height:300px;overflow-y:auto;';
    if (name === 'Write' && input.content != null) {
        return '<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">' + makeFileLinksClickable(escHtml(input.file_path || '')) + '</div><div style="' + codeWrap + '"><pre style="' + codeStyle + '">' + escHtml(input.content) + '</pre></div>';
    }
    if (name === 'Edit') {
        var h = '<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">' + makeFileLinksClickable(escHtml(input.file_path || '')) + '</div>';
        var oldStr = input.old_string != null ? input.old_string : '';
        var newStr = input.new_string != null ? input.new_string : '';
        // Compute unified diff
        var oldLines = oldStr.split('\n');
        var newLines = newStr.split('\n');
        // Simple LCS-based diff
        var diffLines = _computeUnifiedDiff(oldLines, newLines);
        h += '<div style="' + codeWrap + 'padding:0;border-radius:4px;overflow:hidden;">';
        h += '<pre style="margin:0;font-size:12px;line-height:1.5;overflow-x:auto;">';
        diffLines.forEach(function(d) {
            var lineText = escHtml(d.text);
            if (d.type === '-') {
                h += '<div style="background:rgba(248,113,113,0.1);color:#f87171;padding:0 8px;"><span style="user-select:none;color:#f87171;opacity:0.6;width:16px;display:inline-block;">−</span>' + lineText + '</div>';
            } else if (d.type === '+') {
                h += '<div style="background:rgba(134,239,172,0.1);color:#86efac;padding:0 8px;"><span style="user-select:none;color:#86efac;opacity:0.6;width:16px;display:inline-block;">+</span>' + lineText + '</div>';
            } else {
                h += '<div style="color:var(--muted);padding:0 8px;opacity:0.5;"><span style="user-select:none;width:16px;display:inline-block;"> </span>' + lineText + '</div>';
            }
        });
        h += '</pre></div>';
        return h;
    }
    if (name === 'Bash' && input.command) {
        return '<div style="' + codeWrap + '"><pre style="' + codeStyle + '">' + escHtml(input.command) + '</pre></div>';
    }
    if (name === 'Read' && input.file_path) {
        var h = '<div style="font-size:11px;color:var(--muted);">' + makeFileLinksClickable(escHtml(input.file_path)) + '</div>';
        if (input.offset || input.limit) h += '<div style="font-size:11px;color:var(--muted);">lines ' + (input.offset || 1) + (input.limit ? '–' + ((input.offset || 1) + input.limit - 1) : '') + '</div>';
        return h;
    }
    if (name === 'Agent' && input.prompt) {
        return '<div style="' + codeWrap + '"><pre style="' + codeStyle + '">' + escHtml(input.prompt) + '</pre></div>';
    }
    try { return '<pre style="' + codeStyle + 'max-height:200px;">' + escHtml(JSON.stringify(input, null, 2)) + '</pre>'; } catch { return escHtml(String(input)); }
}

function makeFileLinksClickable(html) {
    // Match absolute paths (/foo/bar.txt), relative paths (foo/bar.txt), and filenames with extensions
    // Skip if already inside an HTML tag or link
    // Extensions sorted longest-first to avoid partial matches (json before js, etc.)
    return html.replace(/(?<![="\/\w])(((?:\.\.?\/|\/|[\w-]+\/)[\w./-]+\.[\w]+|[\w.-]+\.(?:jpeg|json|yaml|html|glsl|vert|frag|toml|conf|java|cpp|hpp|txt|csv|log|cfg|png|jpg|gif|svg|pdf|css|xml|py|js|ts|md|yml|sh|rs|go|cu|c|h))(?::(\d+))?)/g, (match, full, path, ext, line) => {
        const cleanPath = full.split(':')[0];
        return `<a class="file-link" href="#" onclick="ideBridge.openFile('${cleanPath}', ${line || 0}); return false;">${match}</a>`;
    });
}

// Keep live streaming thinking + spinner at the very bottom of the message list.
// Finalized thinking blocks (.msg-thinking) stay where they were rendered in their turn.
function _ensureThinkingLast() {
    // Move live streaming thinking to the bottom
    var think = document.getElementById('stream-thinking');
    if (think && think.parentNode === messagesEl) messagesEl.appendChild(think);
    // Spinner always last
    if (spinnerEl && spinnerEl.parentNode === messagesEl) messagesEl.appendChild(spinnerEl);
}

// --- Event renderer (pixel-identical to dashboard) ---
function renderEvent(event) {
    const ph = messagesEl.querySelector('[data-placeholder]');
    if (ph) ph.remove();
    const etype = event.type;
    // Safety: if a pending question exists but modal isn't showing, show it now
    if (_pendingQuestion && !_replayingHistory && !document.getElementById('question-modal')) {
        var pq = _pendingQuestion;
        setBusy(false);
        showQuestionModal(pq, (answer) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'answer', text: answer}));
            }
            setBusy(true);
        });
    }

    // Skip internal events
    if (etype === 'system') {
        if (event.subtype === 'debug') console.log('[DEBUG]', JSON.stringify(event.data));
        if (event.subtype === 'turn_complete') {
            // Backend confirms turn is done — ensure spinner stops
            if (busy && !_replayingHistory) setBusy(false);
            return;
        }
        if (event.subtype === 'pre_compact') {
            // About to compact — update spinner text
            if (!_replayingHistory) _compacting = true;
            return;
        }
        if (event.subtype === 'compact_boundary') {
            // SDK auto-compacted — show indicator
            _compacting = false;
            if (!_replayingHistory) {
                var cdiv = document.createElement('div');
                cdiv.className = 'system-notice';
                cdiv.style.cssText = 'text-align:center;padding:8px 0;color:var(--muted);font-size:12px;border-top:1px dashed var(--border);border-bottom:1px dashed var(--border);margin:8px 0;';
                cdiv.textContent = '\u2193 Context compacted \u2014 older messages summarized \u2193';
                messagesEl.appendChild(cdiv);
                autoScroll();
            }
            return;
        }
        var d = event.data || {};
        if (event.subtype === 'task_started') {
            _activeTasks[d.task_id] = {description: d.description || '', activity: '', status: 'active', type: d.task_type || ''};
            _renderTaskPanel();
        } else if (event.subtype === 'task_progress') {
            if (_activeTasks[d.task_id]) {
                _activeTasks[d.task_id].activity = d.description || d.last_tool_name || '';
            }
            _renderTaskPanel();
        } else if (event.subtype === 'task_notification') {
            if (_activeTasks[d.task_id]) {
                _activeTasks[d.task_id].status = 'done';
                _activeTasks[d.task_id].activity = d.summary || 'Done';
            }
            _renderTaskPanel();
            // Remove done tasks after a short delay
            setTimeout(function() { delete _activeTasks[d.task_id]; _renderTaskPanel(); }, 5000);
        }
        return;
    }
    if (etype === 'rate_limit') {
        // Store per-type rate limit info
        var rlKey = event.rate_limit_type;
        if (!rlKey) return;  // skip events without a type
        if (!_rateLimitInfo || typeof _rateLimitInfo !== 'object') _rateLimitInfo = {};
        _rateLimitInfo[rlKey] = {
            status: event.status,
            utilization: event.utilization,
            resets_at: event.resets_at,
            type: event.rate_limit_type,
            overage_status: event.overage_status,
        };
        try { localStorage.setItem('agent-view-ratelimit', JSON.stringify(_rateLimitInfo)); } catch(e) {}
        return;
    }
    // Question was answered (by us or another client) — clear pending + dismiss modal
    if (etype === 'question_answered') {
        _pendingQuestion = null;
        _pendingPlanReview = null;
        _hideQuestionBanner();
        if (!_replayingHistory) {
            var modal = document.getElementById('question-modal');
            if (modal) {
                modal.remove();
                var inputBox = document.getElementById('input-box');
                var handle = document.getElementById('drag-handle');
                if (inputBox) inputBox.style.display = '';
                if (handle) handle.style.display = '';
                // Force repaint
                var ia = document.getElementById('input-area');
                if (ia) { ia.style.display = 'none'; ia.offsetHeight; ia.style.display = ''; }
            }
            setBusy(true);
        }
        // Show the answer in the timeline
        var answerText = event.answer || '';
        if (answerText) {
            var ansEl = document.createElement('div');
            ansEl.className = 'msg msg-claude msg-claude-dot';
            ansEl.style.setProperty('--dot-top', 'calc(8px + 0.42em)');
            ansEl.innerHTML = '<div style="padding:8px 12px;background:rgba(192,132,252,0.08);border-radius:6px;border-left:3px solid #c084fc;font-size:13px;color:var(--fg);line-height:1.5;">'
                + '<span style="font-size:11px;color:#c084fc;font-weight:600;">Answer: </span>'
                + escHtml(answerText) + '</div>';
            messagesEl.appendChild(ansEl);
            _ensureThinkingLast();
            autoScroll();
        }
        return;
    }
    // Server-side queued message — render dimmed like a pending user message
    if (etype === 'queued_message') {
        var content = event.content || '';
        var div = document.createElement('div');
        div.className = 'msg msg-user';
        div.setAttribute('data-queued', '1');
        div.innerHTML = '<div style="padding:10px 14px;background:var(--user-bg);border-radius:8px;border-left:3px solid var(--accent);white-space:pre-wrap;line-height:1.5;opacity:0.6;"><span style="float:right;font-size:10px;color:var(--accent);">queued</span>' + escHtml(content) + '</div>';
        messagesEl.appendChild(div);
        var group = document.createElement('div');
        group.className = 'msg-group';
        group.setAttribute('data-queued-group', '1');
        messagesEl.appendChild(group);
        autoScroll();
        return;
    }
    // Server promoted a queued message — update the visual
    if (etype === 'queued_promoted') {
        var queuedEl = messagesEl.querySelector('[data-queued]');
        if (queuedEl) {
            queuedEl.removeAttribute('data-queued');
            var inner = queuedEl.querySelector('div');
            if (inner) {
                inner.style.opacity = '1';
                var badge = inner.querySelector('span');
                if (badge && badge.textContent.trim() === 'queued') badge.remove();
            }
        }
        var queuedGroup = messagesEl.querySelector('[data-queued-group]');
        if (queuedGroup) {
            var oldCurrent = document.getElementById('current-group');
            if (oldCurrent) oldCurrent.removeAttribute('id');
            queuedGroup.removeAttribute('data-queued-group');
            queuedGroup.id = 'current-group';
            if (event.turn_id) queuedGroup.setAttribute('data-turn', event.turn_id);
        }
        if (!_replayingHistory) setBusy(true);
        return;
    }
    // Apply settings from server
    if (etype === 'settings') {
        _hideLoading();  // settings always arrives after history — safe to hide
        var modeMap = {default: 0, acceptEdits: 1, plan: 2};
        var effortMap = {low: 0, medium: 1, high: 2, xhigh: 3, max: 4};
        if (event.mode in modeMap) { modeIdx = modeMap[event.mode]; updateModeUI(); }
        if (event.effort in effortMap) { effortIdx = effortMap[event.effort]; updateEffortUI(); }
        if (event.model) _currentModel = event.model;
        if (event.models && event.models.length) { _availableModels = event.models; if (typeof _updateModelSelect === 'function') _updateModelSelect(); }
        // Show pending question modal if backend reports one (late-joining client)
        if (event.pending_question && !_replayingHistory) {
            _pendingQuestion = event.pending_question;
            setBusy(false);
            showQuestionModal(event.pending_question, (answer) => {
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({type: 'answer', text: answer}));
                }
                setBusy(true);
            });
        }
        // Show pending plan review if backend reports one (late-joining client)
        if (event.pending_plan_review && !_replayingHistory) {
            setBusy(false);
            showPlanModal(event.pending_plan_review.plan || '(empty plan)', function(answer) {
                // Backend broadcasts `settings` when the mode actually
                // changes — don't touch modeIdx optimistically here.
                if (answer.startsWith('feedback:')) {
                    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'answer', text: answer.slice(9)}));
                    setBusy(true);
                } else if (answer === 'approved') {
                    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'answer', text: 'approved'}));
                    setBusy(true);
                } else if (answer === 'rejected') {
                    if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'answer', text: 'rejected'}));
                    setBusy(true);
                }
            });
        }
        return;
    }
    if (etype === 'models') {
        if (event.models && event.models.length) { _availableModels = event.models; if (typeof _updateModelSelect === 'function') _updateModelSelect(); }
        return;
    }
    if (etype === 'context_usage') {
        var d = event.data || {};
        var cats = d.categories || [];
        var total = d.totalTokens || 0;
        var max = d.maxTokens || MAX_CONTEXT;
        // Update the ring/label with the REAL context data from SDK
        _hasContextUsageEvent = true;
        totalTokens = total;
        MAX_CONTEXT = max;
        var realPct = Math.min(1, total / max);
        var circumference = 37.7;
        if (contextRing) {
            contextRing.style.strokeDashoffset = circumference * (1 - realPct);
            contextRing.style.stroke = realPct < 0.5 ? 'var(--success)' : realPct < 0.8 ? '#c4a000' : realPct < 0.95 ? '#f0a020' : 'var(--error)';
        }
        var kStr = (total / 1000).toFixed(0);
        var pctLabel = (realPct * 100).toFixed(0);
        var label = document.getElementById('context-label');
        if (label) {
            label.textContent = kStr + 'K \u00b7 ' + pctLabel + '%';
            label.style.color = realPct < 0.5 ? 'var(--muted)' : realPct < 0.8 ? '#c4a000' : realPct < 0.95 ? '#f0a020' : 'var(--error)';
        }
        // Only show the popup when the user explicitly clicked "Context breakdown"
        if (!_showContextPopup) return;
        _showContextPopup = false;
        var pct = d.percentage != null ? d.percentage.toFixed(1) : (total / max * 100).toFixed(1);
        var autoCompact = d.isAutoCompactEnabled ? 'on' : 'off';
        var oldP = document.getElementById('context-usage-popup');
        if (oldP) oldP.remove();
        var popup = document.createElement('div');
        popup.id = 'context-usage-popup';
        popup.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:20px 24px;min-width:340px;max-width:420px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.6);';
        var closeBtn = document.createElement('button');
        closeBtn.innerHTML = '&times;';
        closeBtn.style.cssText = 'position:absolute;top:10px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;';
        var esc = function(e) { if (e.key === 'Escape') { popup.remove(); document.removeEventListener('keydown', esc); } };
        closeBtn.addEventListener('click', function() { popup.remove(); document.removeEventListener('keydown', esc); });
        document.addEventListener('keydown', esc);
        popup.appendChild(closeBtn);
        var h = document.createElement('div');
        h.style.cssText = 'font-size:15px;font-weight:600;color:var(--fg);margin-bottom:4px;';
        h.textContent = 'Context breakdown';
        popup.appendChild(h);
        var sub = document.createElement('div');
        sub.style.cssText = 'font-size:12px;color:var(--muted);margin-bottom:12px;';
        sub.textContent = (total/1000).toFixed(0) + 'K / ' + (max/1000).toFixed(0) + 'K tokens (' + pct + '%) \u2022 Auto-compact: ' + autoCompact + (d.autoCompactThreshold ? ' (at ' + (d.autoCompactThreshold/1000).toFixed(0) + 'K)' : '');
        popup.appendChild(sub);
        for (var ci = 0; ci < cats.length; ci++) {
            var c = cats[ci];
            var tk = (c.tokens/1000).toFixed(1);
            var bar = Math.min(100, c.tokens / max * 100);
            var row = document.createElement('div');
            row.style.cssText = 'margin:4px 0;display:flex;align-items:center;gap:8px;font-size:12px;';
            row.innerHTML = '<span style="width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escHtml(c.name) + '</span><div style="flex:1;height:6px;background:var(--border);border-radius:3px;"><div style="width:' + bar + '%;height:100%;background:' + (c.color || 'var(--accent)') + ';border-radius:3px;"></div></div><span style="width:45px;text-align:right;color:var(--muted);">' + tk + 'K</span>';
            popup.appendChild(row);
        }
        document.body.appendChild(popup);
        return;
    }

    // Real-time text streaming from StreamEvent deltas — render markdown live
    if (etype === 'stream_start' || etype === 'stream_delta' || etype === 'stream_stop') {
        if (_replayingHistory) return;
        if (event.btw) return;  // BTW stream goes to panel, not main chat
        if (etype === 'stream_start' && event.block_type === 'text') {
            _streamBlockType = 'text';
            var existing = document.getElementById('stream-bubble');
            if (existing) existing.remove();
            _streamBubbleRaw = '';
            var sb = document.createElement('div');
            sb.id = 'stream-bubble';
            sb.className = 'msg msg-claude msg-claude-dot';
            sb.style.cssText = 'line-height:1.6;color:#e0e0e0;';
            messagesEl.appendChild(sb);
            _ensureThinkingLast();
        } else if (etype === 'stream_start' && event.block_type === 'thinking') {
            _streamBlockType = 'thinking';
            // Start live thinking block during streaming
            var existingThink = document.getElementById('stream-thinking');
            if (existingThink) existingThink.remove();
            _streamThinkingRaw = '';
            var st = document.createElement('div');
            st.id = 'stream-thinking';

        } else {

                // source of truth for permission_mode and broadcasts a
                // `settings` event whenever the mode actually changes.
                // On approve it flips to "default" → UI button updates.

        if (event.model_usage) {

}


var _groupLinesQueued = false;
function _updateGroupLines() {
    // Throttle: at most once per animation frame
    if (_groupLinesQueued) return;
    _groupLinesQueued = true;
    requestAnimationFrame(_updateGroupLinesNow);
}
function _updateGroupLinesNow() {
    _groupLinesQueued = false;
    // Remove old connecting lines
    messagesEl.querySelectorAll('.dot-line').forEach(l => l.remove());
    // Collect runs of consecutive .msg-claude-dot (separated by .msg-user)
    var children = Array.from(messagesEl.children);
    var run = [];
    for (var ci = 0; ci < children.length; ci++) {
        var ch = children[ci];
        if (ch.classList && ch.classList.contains('msg-claude-dot')) {
            run.push(ch);
        } else if (ch.classList && ch.classList.contains('msg-user')) {
            _drawRunLines(run);
            run = [];
        }
    }
    _drawRunLines(run);
}
function _drawRunLines(dots) {
    if (dots.length < 2) return;
    for (var i = 0; i < dots.length - 1; i++) {
        var cur = dots[i];
        var nxt = dots[i + 1];
        var curDotTop = parseFloat(getComputedStyle(cur, '::before').top) || 0;
        var nxtDotTop = parseFloat(getComputedStyle(nxt, '::before').top) || 0;
        var top = curDotTop + 3.5;  // center of dot (7px / 2)
        var bottom = (nxt.offsetTop - cur.offsetTop) + nxtDotTop + 3.5;
        if (bottom > top) {
            var line = document.createElement('div');
            line.className = 'dot-line';
            line.style.top = top + 'px';
            line.style.height = (bottom - top) + 'px';
            cur.appendChild(line);
        }
    }
}
// Recalculate lines when any <details> toggles (expand/collapse changes dot positions)
messagesEl.addEventListener('toggle', function() { _updateGroupLines(); }, true);

// Copy button on fenced code blocks rendered by _mdToHtml. Event delegation
// survives re-renders during streaming (the button DOM is recreated on
// every rAF tick, the handler lives on messagesEl). The code payload lives
// inside the sibling <pre><code> — we read its textContent so no attribute
// escaping can go wrong no matter what characters the code contains.
messagesEl.addEventListener('click', function(e) {
    var btn = e.target.closest && e.target.closest('.md-copy-btn');
    if (!btn) return;
    e.stopPropagation();
    e.preventDefault();
    var block = btn.closest('.md-code-block');
    var pre = block && block.querySelector('pre');
    var text = pre ? pre.textContent : '';
    var _restore = btn.innerHTML;
    var _done = function(ok) {
        btn.innerHTML = ok
            ? '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="#3fb950" stroke-width="2" style="pointer-events:none;"><path d="M3 8l3 3 7-7"/></svg>Copied'
            : '<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="#f85149" stroke-width="2" style="pointer-events:none;"><path d="M4 4l8 8M12 4l-8 8"/></svg>Failed';
        setTimeout(function() { btn.innerHTML = _restore; }, 1500);
    };
    // JCEF-friendly path: the explicit bridge (window.__beClipWrite) goes to
    // the OS clipboard via Java AWT even when JCEF's JS Clipboard API is
    // isolated. Fall back to the browser API when the bridge isn't present.
    if (window.__beClipWrite) {
        try { window.__beClipWrite(text); _done(true); return; } catch (_) {}
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(function() { _done(true); }, function() { _done(false); });
    } else {
        _done(false);
    }
});

var _blinkingNav = false;
var _importantEvent = false;   // set by question, result, session_end — triggers scroll even when not at bottom

function _startNavBlink() {
    if (_blinkingNav) return;
    _blinkingNav = true;
    navDownBtn.style.animation = 'nav-blink 0.8s ease-in-out infinite';
    navDownBtn.style.opacity = '1';
}
function _stopNavBlink() {
    if (!_blinkingNav) return;
    _blinkingNav = false;
    navDownBtn.style.animation = '';
    navDownBtn.style.opacity = navDownBtn.disabled ? '0.25' : '0.7';
}

// Track near-bottom state via scroll event instead of reading on every frame.
// Reading scrollHeight forces synchronous layout — very expensive with 1000+ messages.
var _isNearBottom = true;
messagesEl.addEventListener('scroll', function() {
    _isNearBottom = messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 100;
    if (_isNearBottom) _stopNavBlink();
}, {passive: true});

function autoScroll() {
    // Spinner stays where setBusy placed it — do NOT move it here.
    // NOTE: _updateGroupLines() and _updateNavButtons() are NOT called here —
    // they're too expensive for large sessions. They're called explicitly
    // after content changes (new messages) instead of on every scroll frame.
    if (_isNearBottom) {
        messagesEl.scrollTop = messagesEl.scrollHeight;
        _stopNavBlink();
    } else if (_importantEvent) {
        messagesEl.scrollTop = messagesEl.scrollHeight;
        _isNearBottom = true;
        _stopNavBlink();
        _importantEvent = false;
    } else if (busy) {
        _startNavBlink();
    }
}

// --- Message navigation (jump between user questions) ---
// _navIdx always points to a valid user message index.
// Starts at the last message. Up goes older, down goes newer.
var _navIdx = -1;  // will be set to last on first update
const navUpBtn = document.getElementById('nav-up');
const navDownBtn = document.getElementById('nav-down');
const navEl = document.getElementById('msg-nav');

function _getUserMessages() {
    return Array.from(messagesEl.querySelectorAll('.msg-user'));
}

var _navUserAction = false;  // true when user clicked a nav button (prevents autoScroll reset)
var _navHoldTimer = null;

function _updateNavButtons() {
    const msgs = _getUserMessages();
    const count = msgs.length;
    if (count === 0) { _navIdx = -1; return; }
    // Only clamp to last if NOT actively navigating
    if (!_navUserAction) {
        if (_navIdx < 0 || _navIdx >= count) _navIdx = count - 1;
    } else {
        // Just keep in bounds
        if (_navIdx >= count) _navIdx = count - 1;
        if (_navIdx < 0) _navIdx = 0;
    }
    navUpBtn.disabled = count < 2 || _navIdx <= 0;
    navDownBtn.disabled = false;  // always enabled — scrolls to bottom even with 0-1 messages
    navUpBtn.style.opacity = navUpBtn.disabled ? '0.25' : '0.7';
    if (!_blinkingNav) navDownBtn.style.opacity = navDownBtn.disabled ? '0.25' : '0.7';
    // Dynamic tooltips showing target message text
    var _navMsgs = _getUserMessages();
    var _trunc = function(el) { var t = (el.querySelector('div') || el).textContent || ''; return t.length > 60 ? t.slice(0,60) + '\u2026' : t; };
    navUpBtn.title = (!navUpBtn.disabled && _navIdx > 0) ? '\u2191 ' + _trunc(_navMsgs[_navIdx - 1]) : 'Previous message';
    navDownBtn.title = (!navDownBtn.disabled && _navIdx < count - 1) ? '\u2193 ' + _trunc(_navMsgs[_navIdx + 1]) : (_navIdx >= count - 1 ? 'Scroll to bottom' : 'Next message');
}

function _navTo(idx) {
    const msgs = _getUserMessages();
    if (msgs.length < 1) { messagesEl.scrollTop = messagesEl.scrollHeight; return; }
    _navUserAction = true;
    // Past the last message → scroll to very bottom, clear highlight
    if (idx >= msgs.length) {
        _navIdx = msgs.length - 1;
        msgs.forEach((m) => { var inner = m.querySelector('div'); if (inner) inner.style.boxShadow = ''; });
        messagesEl.scrollTop = messagesEl.scrollHeight;
        _navUserAction = false;
        _updateNavButtons();
        return;
    }
    _navIdx = Math.max(0, idx);
    // Highlight current message's inner box, remove from others
    msgs.forEach((m, i) => {
        var inner = m.querySelector('div');
        if (!inner) return;
        if (i === _navIdx) {
            inner.style.boxShadow = 'inset 0 0 0 2px var(--accent)';
        } else {
            inner.style.boxShadow = '';
        }
    });
    msgs[_navIdx].scrollIntoView({ block: 'start', behavior: 'smooth' });
    _updateNavButtons();
}

// Single click: one step
navUpBtn.addEventListener('click', (e) => {
    e.preventDefault(); e.stopPropagation();
    _navTo(_navIdx - 1);
});
navDownBtn.addEventListener('click', (e) => {
    e.preventDefault(); e.stopPropagation();
    _stopNavBlink();
    _navTo(_navIdx + 1);
});

// Long press (3s): jump to first/last
function _startHold(btn, targetFn) {
    _navHoldTimer = setTimeout(() => {
        _navHoldTimer = null;
        targetFn();
    }, 1000);
}
function _cancelHold() {
    if (_navHoldTimer) { clearTimeout(_navHoldTimer); _navHoldTimer = null; }
}
navUpBtn.addEventListener('mousedown', () => _startHold(navUpBtn, () => _navTo(0)));
navUpBtn.addEventListener('mouseup', _cancelHold);
navUpBtn.addEventListener('mouseleave', _cancelHold);
navDownBtn.addEventListener('mousedown', () => _startHold(navDownBtn, () => _navTo(_getUserMessages().length - 1)));
navDownBtn.addEventListener('mouseup', _cancelHold);
navDownBtn.addEventListener('mouseleave', _cancelHold);

// --- Session ended state ---
var _sessionEnded = false;
function _showSessionEnded(resumable, message) {
    if (_sessionEnded) return;
    _sessionEnded = true;

    // Banner in timeline
    var banner = document.createElement('div');
    banner.style.cssText = 'display:flex;align-items:center;gap:12px;padding:12px 0;margin:8px 0;';
    var line1 = document.createElement('div');
    line1.style.cssText = 'flex:1;height:1px;background:#30363d;';
    var text = document.createElement('div');
    text.style.cssText = 'font-size:12px;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:8px;';
    text.innerHTML = '<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#f85149;"></span>' +
        escHtml(message || 'Session ended');
    var line2 = line1.cloneNode(true);
    banner.appendChild(line1);
    banner.appendChild(text);
    banner.appendChild(line2);
    messagesEl.appendChild(banner);

    // Replace input area with ended state
    var inputArea = document.getElementById('input-area');
    var inputBox = document.getElementById('input-box');
    var handle = document.getElementById('drag-handle');
    if (inputBox) inputBox.style.display = 'none';
    if (handle) handle.style.display = 'none';

    var endPanel = document.createElement('div');
    endPanel.id = 'session-ended-panel';
    endPanel.style.cssText = 'padding:14px 16px;border-top:1px solid #30363d;display:flex;align-items:center;gap:12px;';

    var dot = document.createElement('span');
    dot.style.cssText = 'width:8px;height:8px;border-radius:50%;background:#f85149;flex-shrink:0;';
    endPanel.appendChild(dot);

    var label = document.createElement('div');
    label.style.cssText = 'flex:1;font-size:13px;color:var(--muted);';
    label.textContent = resumable ? 'Session exited. Resume to continue.' : 'Session ended.';
    endPanel.appendChild(label);

    if (resumable) {
        var resumeBtn = document.createElement('button');
        resumeBtn.textContent = 'Resume';
        resumeBtn.style.cssText = 'background:#4a6cf7;color:white;border:none;border-radius:6px;padding:8px 18px;cursor:pointer;font-size:13px;font-weight:500;';
        resumeBtn.addEventListener('click', function() {
            resumeBtn.disabled = true;
            resumeBtn.textContent = 'Resuming...';
            resumeBtn.style.opacity = '0.6';
            // Call resume API
            var sid = new URLSearchParams(window.location.search).get('session');
            var wsParam = new URLSearchParams(window.location.search).get('ws');
            var baseUrl = wsParam ? wsParam.replace(/^ws/, 'http') : '';
            fetch(baseUrl + '/sessions/' + encodeURIComponent(sid) + '/resume', {method: 'POST', headers: {'Content-Type': 'application/json'}, body: '{}'})
                .then(function(r) {
                    if (r.ok) {
                        return r.json().then(function(resumed) {

                            var newUrl = new URL(window.location);
                            newUrl.searchParams.set('session', resumed.id);

                                window.parent.postMessage({
                                    type: 'session-resumed',
                                    oldId: sid,
                                    newId: resumed.id,
                                    name: resumed.name,
                                    sessionType: resumed.session_type
                                }, '*');
                            }
                            // Reconnect with the new session ID
                            SESSION_ID = resumed.id;
                            endPanel.remove();
                            if (inputBox) inputBox.style.display = '';
                            if (handle) handle.style.display = '';
                            _sessionEnded = false;
                            retryCount = 0;
                            connect();
                        });
                    } else {
                        resumeBtn.textContent = 'Resume failed';
                        resumeBtn.style.background = '#f85149';
                    }
                })

// --- Question modal ---
function showQuestionModal(q, onAnswer) {
    const inputArea = document.getElementById('input-area');
    const inputBox = document.getElementById('input-box');
    const handle = document.getElementById('drag-handle');

    // Close BTW panel if open — question needs the input area
    var btwPanel = document.getElementById('btw-panel');
    if (btwPanel) btwPanel.classList.remove('open');

    // Remove any existing modal
    const old = document.getElementById('question-modal');
    if (old) old.remove();

    // Hide normal input + drag handle
    if (inputBox) inputBox.style.display = 'none';
    if (handle) handle.style.display = 'none';

    // Scroll messages to bottom
    messagesEl.scrollTop = messagesEl.scrollHeight;

    // AskUserQuestion uses label for answers; permission questions use value
    const isAskUser = q.source === 'ask_user';
    const isMulti = !!q.multiSelect;

    // Build modal as the input area content
    const modal = document.createElement('div');
    modal.id = 'question-modal';
    modal.style.cssText = 'padding:14px 16px;overflow-y:auto;overflow-x:hidden;max-height:50vh;border-top:2px solid var(--accent);position:relative;box-sizing:border-box;';

    // Close button (top-right X)
    const closeBtn = document.createElement('button');
    closeBtn.innerHTML = '&times;';
    closeBtn.style.cssText = 'position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;border-radius:4px;';
    closeBtn.addEventListener('mouseover', () => { closeBtn.style.color = 'var(--fg)'; closeBtn.style.background = 'var(--border)'; });
    closeBtn.addEventListener('mouseout', () => { closeBtn.style.color = 'var(--muted)'; closeBtn.style.background = 'none'; });
    closeBtn.addEventListener('click', () => dismiss('cancelled'));
    modal.appendChild(closeBtn);

    // Header
    if (q.header) {
        const hdr = document.createElement('div');
        hdr.style.cssText = 'font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;';
        hdr.textContent = q.header;
        modal.appendChild(hdr);
    }

    // Question text
    const qText = document.createElement('div');
    qText.style.cssText = 'color:var(--fg);line-height:1.5;font-size:14px;margin-bottom:10px;';
    var questionHtml = _mdToHtml(q.question || q.text || '');
    if (isMulti) questionHtml += ' <span style="font-size:11px;color:var(--muted);">(select one or more)</span>';
    qText.innerHTML = questionHtml;
    modal.appendChild(qText);

    function dismiss(answer) {
        modal.remove();
        if (inputBox) inputBox.style.display = '';
        if (handle) handle.style.display = '';
        document.removeEventListener('keydown', escHandler);
        // Force repaint (JCEF sometimes leaves ghost rendering)
        var ia = document.getElementById('input-area');
        if (ia) { ia.style.display = 'none'; ia.offsetHeight; ia.style.display = ''; }
        setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 50);
        onAnswer(answer);
    }

    // Options (keyboard navigable: arrows to move, Enter/Space to select)
    const opts = q.options || q.choices || [];
    var optBtns = [];
    var _focusIdx = 0;
    // Multi-select: track which options are selected
    var _selected = new Set();

    function _updateOptVisuals() {
        optBtns.forEach((b, i) => {
            var focused = i === _focusIdx;
            var selected = _selected.has(i);
            b.style.borderColor = selected ? 'var(--accent)' : (focused ? 'var(--accent)' : 'var(--border)');
            b.style.background = selected ? 'rgba(192,132,252,0.12)' : (focused ? 'var(--tool-header)' : 'var(--code-bg)');
            // Update the indicator (radio circle or checkbox)
            var indicator = b.querySelector('[data-indicator]');
            if (indicator) {
                if (isMulti) {
                    indicator.innerHTML = selected ? '<svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 5l2.5 2.5L8 3" stroke="var(--accent)" stroke-width="1.5" fill="none"/></svg>' : '';
                } else {
                    indicator.innerHTML = selected ? '<span style="width:8px;height:8px;background:var(--accent);border-radius:50%;display:block;"></span>' : '';
                }
            }
        });
        // Show/hide submit button for multi-select
        if (submitBtn) submitBtn.style.display = _selected.size > 0 ? '' : 'none';
    }

    function _focusOpt(idx) {
        _focusIdx = Math.max(0, Math.min(idx, optBtns.length - 1));
        _updateOptVisuals();
        optBtns[_focusIdx].focus();
    }

    function _toggleOpt(idx) {
        if (_selected.has(idx)) _selected.delete(idx);
        else _selected.add(idx);
        _updateOptVisuals();
    }

    function _submitMulti() {
        // Join selected labels with ", " per SDK spec
        var labels = [];
        optBtns.forEach((b, i) => {
            if (_selected.has(i)) labels.push(b.dataset.label);
        });
        if (labels.length) dismiss(labels.join(', '));
    }

    var submitBtn = null;

    if (opts.length) {
        opts.forEach((opt, oi) => {
            const label = typeof opt === 'string' ? opt : (opt.label || opt.value || String(opt));
            const desc = typeof opt === 'object' ? (opt.description || '') : '';
            // For AskUserQuestion, answer must be the label; for permissions, use value
            const answerVal = isAskUser ? label : (typeof opt === 'string' ? opt : (opt.value || opt.label || String(opt)));
            const btn = document.createElement('button');
            btn.tabIndex = 0;
            btn.dataset.label = label;
            var indicatorStyle = isMulti
                ? 'width:16px;height:16px;border:2px solid var(--accent);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;'
                : 'width:16px;height:16px;border:2px solid var(--accent);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;';
            btn.style.cssText = 'background:var(--code-bg);color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;font-size:13px;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:4px;width:100%;outline:none;';
            btn.innerHTML = '<span data-indicator style="' + indicatorStyle + '"></span>'
                + '<div><div>' + escHtml(label) + '</div>'
                + (desc ? '<div style="font-size:11px;color:var(--muted);margin-top:2px;">' + escHtml(desc) + '</div>' : '')
                + '</div>';
            btn.addEventListener('mouseover', () => {
                _focusIdx = oi;
                _updateOptVisuals();
            });
            btn.addEventListener('mouseout', () => {
                if (!_selected.has(oi)) {
                    btn.style.borderColor = 'var(--border)';
                    btn.style.background = 'var(--code-bg)';
                }
            });
            btn.addEventListener('click', () => {
                if (isMulti) {
                    _toggleOpt(oi);
                } else {
                    dismiss(answerVal);
                }
            });
            btn.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); _focusOpt(oi + 1); }
                else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); _focusOpt(oi - 1); }
                else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (isMulti) { _toggleOpt(oi); }
                    else { dismiss(answerVal); }
                }
                else if (e.key === ' ') {
                    e.preventDefault();
                    if (isMulti) { _toggleOpt(oi); }
                    else { dismiss(answerVal); }
                }
            });
            optBtns.push(btn);
            modal.appendChild(btn);
        });

        // Multi-select: add submit button (hidden until something is selected)
        if (isMulti) {
            submitBtn = document.createElement('button');
            submitBtn.textContent = 'Submit selection';
            submitBtn.style.cssText = 'display:none;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:8px 16px;cursor:pointer;font-size:13px;font-weight:500;margin-top:6px;width:100%;';
            submitBtn.addEventListener('click', _submitMulti);
            submitBtn.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') { e.preventDefault(); _submitMulti(); }
            });
            modal.appendChild(submitBtn);
        }

        // Focus first option after modal is added to DOM
        setTimeout(() => { if (optBtns.length) _focusOpt(0); }, 50);
    }

    // Free-text input — always shown (below options or standalone)
    let freeInput = null;
    {
        const freeRow = document.createElement('div');
        freeRow.style.cssText = 'display:flex;gap:6px;margin-top:8px;align-items:center;';
        freeInput = document.createElement('input');
        freeInput.type = 'text';
        freeInput.placeholder = isAskUser ? 'Or type a custom answer...' : (opts.length ? 'Tell Claude what to do instead...' : 'Type your answer...');
        freeInput.style.cssText = 'flex:1;background:var(--code-bg);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;outline:none;';
        freeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && freeInput.value.trim()) dismiss(freeInput.value.trim());
        });
        freeRow.appendChild(freeInput);
        modal.appendChild(freeRow);
    }

    // Cancel link (works on touch + keyboard)
    const cancelRow = document.createElement('div');
    cancelRow.style.cssText = 'font-size:11px;color:var(--muted);margin-top:6px;opacity:0.6;cursor:pointer;';
    cancelRow.textContent = 'Cancel';
    cancelRow.addEventListener('click', () => dismiss('cancelled'));
    modal.appendChild(cancelRow);

    const escHandler = (e) => {
        if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) dismiss('cancelled');
    };
    document.addEventListener('keydown', escHandler);

    inputArea.appendChild(modal);
    if (freeInput) freeInput.focus();
}

// Spinner element (shown at bottom of messages when busy)
let spinnerEl = null;

// --- Search / Find in conversation ---
var _searchMatches = [];   // array of <mark> elements
var _searchIdx = -1;       // current match index
var _searchDebounce = null;

function _openSearch() {
    var bar = document.getElementById('search-bar');
    bar.style.display = 'flex';
    // Hide the sticky last-message overlay while searching
    var lmb = document.getElementById('last-msg-bar');
    if (lmb) lmb.style.display = 'none';
    var inp = document.getElementById('search-input');
    inp.value = '';
    inp.focus();
    _clearSearchMarks();
    document.getElementById('search-count').textContent = '0/0';
}

function _closeSearch() {
    document.getElementById('search-bar').style.display = 'none';
    _clearSearchMarks();
    _searchMatches = [];
    _searchIdx = -1;
    if (promptEl) promptEl.focus({ preventScroll: true });
}

function _clearSearchMarks() {
    var marks = messagesEl.querySelectorAll('mark.search-hit');
    for (var i = marks.length - 1; i >= 0; i--) {
        var m = marks[i];
        var parent = m.parentNode;
        parent.replaceChild(document.createTextNode(m.textContent), m);
        parent.normalize();
    }
}

function _performSearch(query) {
    _clearSearchMarks();
    _searchMatches = [];
    _searchIdx = -1;
    if (!query) {
        document.getElementById('search-count').textContent = '0/0';
        return;
    }
    var lowerQ = query.toLowerCase();
    // Walk all text nodes in #messages
    var walker = document.createTreeWalker(messagesEl, NodeFilter.SHOW_TEXT, null, false);
    var textNodes = [];
    while (walker.nextNode()) textNodes.push(walker.currentNode);
    for (var i = 0; i < textNodes.length; i++) {
        var node = textNodes[i];
        var text = node.textContent;
        var lower = text.toLowerCase();
        var pos = lower.indexOf(lowerQ);
        if (pos === -1) continue;
        // Split node and wrap matches
        var frag = document.createDocumentFragment();
        var lastIdx = 0;
        while (pos !== -1) {
            if (pos > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, pos)));
            var mark = document.createElement('mark');
            mark.className = 'search-hit';
            mark.textContent = text.slice(pos, pos + query.length);
            frag.appendChild(mark);
            _searchMatches.push(mark);
            lastIdx = pos + query.length;
            pos = lower.indexOf(lowerQ, lastIdx);
        }
        if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
        node.parentNode.replaceChild(frag, node);
    }
    if (_searchMatches.length > 0) {
        _searchIdx = 0;
        _searchMatches[0].classList.add('search-hit-active');
        _searchMatches[0].scrollIntoView({ block: 'center', behavior: 'smooth' });
    }
    document.getElementById('search-count').textContent = _searchMatches.length > 0
        ? '1/' + _searchMatches.length : '0/0';
}

function _searchNav(dir) {
    if (_searchMatches.length === 0) return;
    _searchMatches[_searchIdx].classList.remove('search-hit-active');
    _searchIdx = (_searchIdx + dir + _searchMatches.length) % _searchMatches.length;
    _searchMatches[_searchIdx].classList.add('search-hit-active');
    _searchMatches[_searchIdx].scrollIntoView({ block: 'center', behavior: 'smooth' });
    document.getElementById('search-count').textContent = (_searchIdx + 1) + '/' + _searchMatches.length;
}

// Wire up search bar events
document.addEventListener('DOMContentLoaded', function() {
    var searchInput = document.getElementById('search-input');
    var searchBar = document.getElementById('search-bar');
    if (!searchInput) return;

    searchInput.addEventListener('input', function() {
        clearTimeout(_searchDebounce);
        _searchDebounce = setTimeout(function() {
            _performSearch(searchInput.value.trim());
        }, 150);
    });
    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); _searchNav(1); }
        if (e.key === 'Enter' && e.shiftKey) { e.preventDefault(); _searchNav(-1); }
        if (e.key === 'ArrowDown') { e.preventDefault(); _searchNav(1); }
        if (e.key === 'ArrowUp') { e.preventDefault(); _searchNav(-1); }
        if (e.key === 'Escape') { e.preventDefault(); _closeSearch(); }
    });
    document.getElementById('search-next').addEventListener('click', function() { _searchNav(1); });
    document.getElementById('search-prev').addEventListener('click', function() { _searchNav(-1); });
    document.getElementById('search-close').addEventListener('click', _closeSearch);
});
