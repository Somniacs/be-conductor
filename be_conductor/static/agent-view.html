function setBusy(b) {
    busy = b;
    updateSendBtn();
    promptEl.placeholder = b ? 'Queue another message...' : 'Message Claude...';
    const _verbs = [
        'Composing', 'Orchestrating', 'Harmonizing', 'Conducting', 'Arranging',
        'Counterpointing', 'Modulating', 'Embellishing', 'Transposing', 'Cadencing',
        'Ornamenting', 'Fuguing', 'Preluding', 'Tempering', 'Improvising',
        'Crescendoing', 'Arpeggiating', 'Syncopating', 'Resonating', 'Attuning',
        'Articulating', 'Fermataing', 'Trilling', 'Glissandoing', 'Pizzicatoing',
        'Staccatoing', 'Fortissimoing', 'Solfèging', 'Overtoning', 'Vibratoing',
    ];
    if (b) {
        busyStartTime = Date.now();
        var _nextVerbChange = Date.now() + 2000 + Math.random() * 3000;
        if (!spinnerEl) {
            spinnerEl = document.createElement('div');
            spinnerEl.style.cssText = 'padding:8px 0;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px;';
            spinnerEl.innerHTML = '<span class="agent-spinner"></span><span class="spinner-verb" style="min-width:120px;"></span><span class="spinner-time" style="color:var(--muted);opacity:0.7;"></span>';
        }
        // Always at the bottom of messages
        messagesEl.appendChild(spinnerEl);
        let verbIdx = Math.floor(Math.random() * _verbs.length);
        function _formatDuration(totalSec) {
            if (totalSec < 60) return totalSec + 's';
            const m = Math.floor(totalSec / 60);
            const s = totalSec % 60;
            if (m < 60) return m + 'm ' + (s > 0 ? s + 's' : '');
            const h = Math.floor(m / 60);
            return h + 'h ' + (m % 60) + 'm';
        }
        const updateSpinner = () => {
            if (!spinnerEl) return;
            const s = Math.round((Date.now() - busyStartTime) / 1000);
            const verb = _compacting ? 'Compacting' : _verbs[verbIdx % _verbs.length];
            spinnerEl.querySelector('.spinner-verb').textContent = verb + '...';
            spinnerEl.querySelector('.spinner-time').textContent = _formatDuration(s);
        };
        updateSpinner();
        if (spinnerInterval) clearInterval(spinnerInterval);
        spinnerInterval = setInterval(() => {
            // Change verb at natural intervals (4-9s)
            if (!_nextVerbChange) _nextVerbChange = Date.now() + 2000 + Math.random() * 3000;
            if (Date.now() >= _nextVerbChange) {
                verbIdx++;
                _nextVerbChange = Date.now() + 2000 + Math.random() * 3000;
            }
            updateSpinner();
        }, 1000);
        autoScroll();
    } else {
        if (spinnerEl) { spinnerEl.remove(); spinnerEl = null; }
        if (spinnerInterval) { clearInterval(spinnerInterval); spinnerInterval = null; }
    }
}

// --- WebSocket ---
function connect() {
    if (!SESSION_ID) {
        const ph = document.createElement('div');
        ph.style.cssText = 'padding:20px;color:var(--muted);text-align:center;';
        ph.textContent = 'No session ID provided.';
        messagesEl.appendChild(ph);
        return;
    }

    const url = `${WS_BASE}/sessions/${SESSION_ID}/stream?source=agent-view`;
    _showLoading();
    ws = new WebSocket(url);

    ws.onopen = () => {
        retryCount = 0;
        const ph = messagesEl.querySelector('[data-placeholder]');
        if (ph) ph.remove();
        // Don't hide loading here — wait for history or first live event.
        // For empty sessions, settings message hides it.
        promptEl.focus({ preventScroll: true });
        // Fetch session info for cwd
        const httpBase = WS_BASE.replace('ws://', 'http://').replace('wss://', 'https://');
        fetch(`${httpBase}/sessions/${SESSION_ID}`).then(r => r.json()).then(info => {
            if (info && info.cwd) {
                _sessionCwd = info.cwd;
                const cwdEl = welcome.querySelector('.agent-cwd');
                if (cwdEl) {
                    cwdEl.innerHTML = '<a class="file-link" href="#" onclick="ideBridge.openFile(\'' + info.cwd.replace(/'/g, "\\'") + '\', 0); return false;" style="color:var(--muted);">' + escHtml(info.cwd.replace(/^\/home\/[^/]+/, '~')) + '</a>';
                }
            }
        }).catch(() => {});
    };

    ws.onmessage = (e) => {
        if (typeof e.data !== 'string') return;
        // Trace arrival BEFORE parse so stalls in JSON.parse (huge
        // history payloads) show up as a gap between recv and parsed.
        // The event type isn't available yet — log raw byte length.
        if (_TRACE_WS) {
            var _msRecv = Math.round(performance.now() - _TRACE_T0);
            console.log('[ws-trace] ' + String(_msRecv).padStart(8) + 'ms recv   bytes=' + e.data.length);
        }
        try {
            const msg = JSON.parse(e.data);
            _wsTrace('parsed', msg, 'bytes=' + e.data.length);
            if (msg.type === 'history') {
                const allMsgs = msg.messages || [];
                _replayingHistory = true;
                // Hide messages during render to avoid per-element reflows
                messagesEl.style.display = 'none';
                try {
                    for (var hi = 0; hi < allMsgs.length; hi++) {
                        try { renderEvent(allMsgs[hi]); } catch (e) {}
                        if (allMsgs[hi].type === 'user_message' && allMsgs[hi].content) _inputHistory.push(allMsgs[hi].content);
                    }
                } finally {
                    _replayingHistory = false;
                }
                // Show all at once — single reflow
                messagesEl.style.display = '';
                _hideLoading();
                messagesEl.scrollTop = messagesEl.scrollHeight;
                // Update nav buttons now that elements are in the DOM
                if (typeof _updateNavButtons === 'function') _updateNavButtons();
                _updateGroupLines();
                // Refresh context ring from SDK (if session is connected)
                if (ws && ws.readyState === WebSocket.OPEN) {
                    ws.send(JSON.stringify({type: 'get_context_usage'}));
                }
                // Set overlay bar
                var lastUserEl = null, lastUserText = '';
                messagesEl.querySelectorAll('.msg-user').forEach(function(el) {
                    lastUserEl = el;
                    var inner = el.querySelector('div');
                    if (inner) lastUserText = inner.textContent || '';
                });
                if (lastUserEl && lastUserText) _updateLastMsgBar(lastUserEl, lastUserText);
                // Show pending question or plan review modal
                if (_pendingQuestion) {
                    setBusy(false);
                    showQuestionModal(_pendingQuestion, (answer) => {
                        if (ws && ws.readyState === WebSocket.OPEN) {
                            ws.send(JSON.stringify({type: 'answer', text: answer}));
                        }
                        setBusy(true);
                    });
                } else if (_pendingPlanReview) {
                    var _pc = _pendingPlanReview.plan || '(empty plan)';
                    setBusy(false);
                    showPlanModal(_pc, function(answer) {
                        // Backend drives mode via `settings` broadcast —
                        // don't touch modeIdx optimistically.
                        if (answer.startsWith('feedback:')) {
                            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'answer', text: answer.slice(9)}));
                            setBusy(true);
                        } else if (answer === 'approved') {
                            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'answer', text: 'approved'}));
                            setBusy(true);
                        } else if (answer === 'rejected') {
                            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'answer', text: 'rejected'}));
                            setBusy(true);
                        }
                    });
                }
            } else if (msg.type === 'history_prepend') {
                // Older messages arriving in chunks — render at the top
                var oldMsgs = msg.messages || [];
                if (oldMsgs.length) {
                    _replayingHistory = true;
                    var savedScroll = messagesEl.scrollHeight;
                    // Create a fragment, render into it, then prepend
                    var frag = document.createDocumentFragment();
                    var tempDiv = document.createElement('div');
                    // Temporarily swap messagesEl target to tempDiv
                    var realMessages = messagesEl;
                    // Render each event — they append to messagesEl, so we
                    // collect the new children after rendering
                    var beforeCount = messagesEl.childNodes.length;
                    try {
                        for (var pi = 0; pi < oldMsgs.length; pi++) {
                            try { renderEvent(oldMsgs[pi]); } catch(e) {}
                            if (oldMsgs[pi].type === 'user_message' && oldMsgs[pi].content) _inputHistory.unshift(oldMsgs[pi].content);
                        }
                    } finally {
                        _replayingHistory = false;
                    }
                    // Move newly appended children to the top
                    var newNodes = [];
                    while (messagesEl.childNodes.length > beforeCount) {
                        newNodes.push(messagesEl.childNodes[beforeCount]);
                        messagesEl.removeChild(messagesEl.childNodes[beforeCount]);
                    }
                    // Find the welcome header to insert after it
                    var firstMsg = messagesEl.querySelector('.msg, .msg-group');
                    for (var ni = 0; ni < newNodes.length; ni++) {
                        if (firstMsg) messagesEl.insertBefore(newNodes[ni], firstMsg);
                        else messagesEl.appendChild(newNodes[ni]);
                    }
                    // Restore scroll position so viewport doesn't jump
                    messagesEl.scrollTop += (messagesEl.scrollHeight - savedScroll);
                }
            } else if (msg.type === 'ping') {
                return;
            } else if (msg.type === 'notification') {
                // Ignore notifications meant for a different session —
                // otherwise every open agent-view shows a badge for events
                // in unrelated sessions.
                if (msg.session_id && msg.session_id !== SESSION_ID) {
                    return;
                }
                // Server notification — ack if focused (suppresses webhook)
                var _notifOn = localStorage.getItem('agent-view-notif') !== 'off';
                if (document.hasFocus()) {
                    if (ws && ws.readyState === 1) {
                        ws.send(JSON.stringify({type: 'notification_ack'}));
                    }
                } else if (_notifOn) {
                    _showNotifBadge(msg.reason || msg.snippet || 'Needs attention');
                    // Don't ack — let webhook fire (Telegram/Signal/etc.)
                }
            } else {
                _wsTrace('render', msg);
                var _rt0 = _TRACE_WS ? performance.now() : 0;
                renderEvent(msg);
                // Update dot lines and nav buttons after content changes (not on every stream delta)
                if (msg.type === 'assistant_message' || msg.type === 'user_message' || msg.type === 'result') {
                    _updateGroupLines();
                    if (typeof _updateNavButtons === 'function') _updateNavButtons();
                }
                if (_TRACE_WS) {
                    var _rdur = Math.round(performance.now() - _rt0);
                    _wsTrace('done', msg, 'renderMs=' + _rdur);
                    // Double rAF = end of next paint. If this timestamp is
                    // far after 'done', the browser's paint was delayed —
                    // classic symptom of main-thread pressure on huge DOMs.
                    // Only trace this for turn-terminal events to keep
                    // log volume manageable during streaming.
                    if (msg.type === 'assistant_message' || msg.type === 'result') {
                        var _paintT = performance.now();
                        requestAnimationFrame(() => requestAnimationFrame(() => {
                            _wsTrace('painted', msg, 'paintMs=' + Math.round(performance.now() - _paintT));
                        }));
                    }
                }
            }
        } catch (err) {
            console.error('[agent-view] renderEvent error:', err, e.data);
            // Show dropped message indicator so user knows something was lost
            if (msg && msg.type === 'assistant_message') {
                var errDiv = document.createElement('div');
                errDiv.className = 'msg';
                errDiv.style.cssText = 'padding:6px 14px;color:var(--error);font-size:11px;';
                errDiv.textContent = '[Render error — message may not be displayed. Reload to recover.]';
                messagesEl.appendChild(errDiv);
            }
        }
    };

    ws.onclose = (ev) => {
        ws = null;
        _hideLoading();
        if (_sessionEnded) return; // Already showing ended state
        if (retryCount < MAX_RETRIES) {
            retryCount++;
            setTimeout(connect, 3000);
        } else {
            _showSessionEnded(true, 'Connection lost');
        }
    };

    ws.onerror = () => {};
}

// --- Send prompt ---
function sendPrompt() {
    const text = promptEl.value.trim();
    if (!text && !pendingAttachments.length) return;
    if (text) { _inputHistory.push(text); _historyIdx = -1; _historyDraft = ''; }
    _stopNavBlink();
    // Only mark as dismissed if there IS an open question modal being answered
    _userDismissedQuestion = !!document.getElementById('question-modal');
    // Plan approval feedback — send as answer, not prompt
    if (_planPendingApproval && text) {
        _planPendingApproval = false;
        promptEl.value = '';
        promptEl.style.height = '38px';
        promptEl.placeholder = 'Message Claude...';
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'answer', text: text}));
        }
        setBusy(true);
        promptEl.focus({ preventScroll: true });
        return;
    }
    // Handle slash commands
    if (text.startsWith('/') && !text.includes(' ') && !text.includes('\n')) {
        var matched = _slashFiltered.filter(function(c) { return !c.section; });
        if (matched.length > 0) { _slashSelect(); return; }
    }
    // /btw — open panel immediately, send directly (bypasses queue)
    if (text.toLowerCase().startsWith('/btw ')) {
        var btwText = text.slice(5).trim();
        if (!btwText) return;
        closeSlashPopup();
        promptEl.value = '';
        promptEl.style.height = '38px';
        _openBtwPanel(btwText);
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'prompt', text: btwText, btw: true}));
        }
        promptEl.focus({ preventScroll: true });
        return;
    }
    // Build message before clearing
    var msg = {type: 'prompt', text: text};
    if (pendingAttachments.length) {
        msg.attachments = pendingAttachments.map(function(a) { return {name: a.name, type: a.type, data: a.data}; });
    }
    // Clear input
    promptEl.value = '';
    promptEl.style.height = '38px';
    inputArea.style.height = '';
    promptEl.style.maxHeight = '';
    _manualResize = false;
    pendingAttachments.length = 0;
    refreshAttachmentPreview();
    closeSlashPopup();
    if (ws && ws.readyState !== WebSocket.OPEN) {
        renderEvent({type: 'error', error: 'Not connected to agent'});
        promptEl.focus({ preventScroll: true });
        return;
    }
    // Track /compact for spinner text
    _compacting = (text === '/compact');
    // Send to backend FIRST so the WS message goes out immediately —
    // doesn't wait for the DOM render.
    ws.send(JSON.stringify(msg));
    // Render user message optimistically — defer to next frame so the
    // keystroke handler returns immediately and the input stays responsive.
    // The DOM work for adding a message can take 50-200ms with a large session.
    promptEl.focus({ preventScroll: true });  // refocus before any heavy work
    if (!busy) {
        _lastOptimisticContent = text || '(attachment)';
        var _optContent = _lastOptimisticContent;
        // Defer all DOM work to next frame so the keystroke + WS send return now
        requestAnimationFrame(function() {
            renderEvent({type: 'user_message', content: _optContent});
            setBusy(true);
            if (spinnerEl && spinnerEl.parentNode === messagesEl) messagesEl.appendChild(spinnerEl);
        });
    }
}

// --- Input handlers ---
var _manualResize = false;
var _slashOpen = false, _slashIdx = 0, _slashFiltered = [];
var _inputHistory = [], _historyIdx = -1, _historyDraft = '';
var _lastOptimisticContent = null;  // skip backend echo of optimistic user_message
var _streamBubbleRaw = '';  // accumulated raw text for live markdown rendering
var _streamThinkingRaw = '';  // accumulated thinking text for live rendering
var _streamBlockType = '';  // current streaming block type (text/thinking)
var _streamRenderPending = false;  // throttle: true while rAF is pending
var _streamThinkPending = false;   // throttle: true while thinking rAF is pending
var _streamThinkPendingText = '';  // thinking text to append next frame
// No auto-resize — textarea uses min-height/max-height + internal scroll.
// Previous JS resize forced a reflow of the entire messages area on every
// keystroke, making typing laggy on large sessions.
promptEl.addEventListener('input', () => {
    updateSendBtn();
    updateSlashPopup();
});

promptEl.addEventListener('keydown', (e) => {
    if (_slashOpen) {
        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
            e.preventDefault();
            _slashNavigate(e.key === 'ArrowDown' ? 1 : -1);
            return;
        }
        if (e.key === 'Enter') { e.preventDefault(); _slashSelect(); return; }
        if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) { e.preventDefault(); closeSlashPopup(); return; }
    }
    // Input history (ArrowUp/Down when input is single-line)
    if (e.key === 'ArrowUp' && !e.shiftKey && _inputHistory.length > 0 && promptEl.selectionStart === 0 && !promptEl.value.includes('\n')) {
        e.preventDefault();
        if (_historyIdx === -1) { _historyDraft = promptEl.value; _historyIdx = _inputHistory.length; }
        if (_historyIdx > 0) {
            _historyIdx--;
            promptEl.value = _inputHistory[_historyIdx];
        }
        return;
    }
    if (e.key === 'ArrowDown' && !e.shiftKey && _historyIdx >= 0 && !promptEl.value.includes('\n')) {
        e.preventDefault();
        _historyIdx++;
        if (_historyIdx >= _inputHistory.length) {
            _historyIdx = -1;
            promptEl.value = _historyDraft;
        } else {
            promptEl.value = _inputHistory[_historyIdx];
        }
        return;
    }
    if (e.key === 'Tab' && e.shiftKey) {
        // Shift+Tab cycles through modes
        e.preventDefault();
        modeIdx = (modeIdx + 1) % MODES.length;
        updateModeUI();
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'set_mode', mode: MODES[modeIdx].value}));
        }
        return;
    }
    if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27 && busy) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'interrupt'}));
        }
        return;
    }
    // Ctrl+Shift+Enter — send current text as a BTW (by the way) message,
    // directly bypassing the normal prompt queue. Opens the BTW panel.
    if (e.key === 'Enter' && e.ctrlKey && e.shiftKey) {
        e.preventDefault();
        e.stopPropagation();
        var btwText = promptEl.value.trim();
        if (!btwText) return;
        closeSlashPopup();
        promptEl.value = '';
        promptEl.style.height = '38px';
        _openBtwPanel(btwText);
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'prompt', text: btwText, btw: true}));
        }
        promptEl.focus({ preventScroll: true });
        return;
    }
    if (e.key === 'Enter' && !e.shiftKey) {
        // Sticky Shift from the extra-keys bar → insert newline manually,
        // then clear the sticky state to match the parent's auto-clear after
        // sendKey. The soft keyboard's Enter doesn't carry shiftKey, so we
        // rely on the parent broadcasting _ekStickyMods.
        if (_ekStickyMods.shift) {
            e.preventDefault();
            e.stopPropagation();
            var _s = promptEl.selectionStart || 0;
            var _e = promptEl.selectionEnd || 0;
            var _cur = promptEl.value;
            promptEl.value = _cur.slice(0, _s) + '\n' + _cur.slice(_e);
            promptEl.selectionStart = promptEl.selectionEnd = _s + 1;
            promptEl.dispatchEvent(new Event('input', {bubbles: true}));
            _ekStickyMods.shift = false;
            // Tell parent to clear its visual shift toggle too.
            try { window.parent.postMessage({type: 'agentClearEkMods'}, '*'); } catch (ignored) {}
            return;
        }
        // On soft keyboards (phones/tablets): Enter inserts a newline and
        // the user sends via the button. Physical keyboards fire Enter with
        // keyCode/which === 13; soft keyboards typically fire 229 or 0 on
        // Android Chrome, because IME composition eats the real keycode.
        // `e.code` is unreliable in JCEF (empty even for physical keys), so
        // rely on keyCode which is consistent across desktop browsers,
        // Chrome/Firefox, JCEF, and Safari.
        var _isPhysicalEnter = (e.keyCode === 13 || e.which === 13);
        if (!_isPhysicalEnter) {
            return;  // soft-keyboard Enter — let the textarea insert \n
        }
        e.preventDefault();
        e.stopPropagation();
        const hasText = promptEl.value.trim().length > 0;
        if (busy && !hasText) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'interrupt'}));
            }
        } else if (hasText) {
            sendPrompt();
        }
    }
});

// Paste images/files from clipboard
document.addEventListener('paste', (e) => {
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const item of items) {
        if (item.kind === 'file') {
            e.preventDefault();
            const file = item.getAsFile();
            if (file) readAttachmentFile(file);
        }
    }
});

// JCEF clipboard bridge: route Ctrl+C from messages area to system clipboard.
// Only fires if the Java bridge is installed (window.__beClipWrite exists).
document.addEventListener('keydown', function(e) {
    if (!window.__beClipWrite) return;
    if (!(e.ctrlKey || e.metaKey) || e.shiftKey || e.altKey) return;
    if (e.key.toLowerCase() !== 'c') return;
    var active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
    var sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    var text = sel.toString();
    if (text) window.__beClipWrite(text);
});


sendBtn.addEventListener('click', () => {
    const hasText = promptEl.value.trim().length > 0;
    if (!busy && !hasText) return;
    if (busy && !hasText) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'interrupt'}));
        }
    } else if (hasText) {
        sendPrompt();
    }
    promptEl.focus({ preventScroll: true }); // keep keyboard open
});

// --- Attachments ---
function readAttachmentFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
        const base64 = reader.result.split(',')[1];
        pendingAttachments.push({
            name: file.name,
            type: file.type || 'application/octet-stream',
            data: base64,
            preview: file.type && file.type.startsWith('image/') ? reader.result : null,
        });
        refreshAttachmentPreview();
    };
    reader.readAsDataURL(file);
}

function refreshAttachmentPreview() {
    attachPreview.innerHTML = '';
    if (!pendingAttachments.length) { attachPreview.style.display = 'none'; return; }
    attachPreview.style.display = 'flex';
    pendingAttachments.forEach((att, idx) => {
        const item = document.createElement('div');
        item.className = 'attachment-item';
        if (att.preview) {
            const img = document.createElement('img');
            img.src = att.preview;
            img.alt = att.name;
            item.appendChild(img);
        }
        const nameSpan = document.createElement('span');
        nameSpan.textContent = att.name;
        nameSpan.style.cursor = 'pointer';
        var isImage = att.type && att.type.startsWith('image/');
        nameSpan.addEventListener('click', () => isImage ? _openAnnotator(idx) : _showAttachmentPreview(att));
        item.appendChild(nameSpan);
        if (att.preview) {
            item.querySelector('img').style.cursor = 'pointer';
            item.querySelector('img').addEventListener('click', () => _openAnnotator(idx));
        }
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.innerHTML = '&times;';
        removeBtn.addEventListener('click', () => {
            pendingAttachments.splice(idx, 1);
            refreshAttachmentPreview();
        });
        item.appendChild(removeBtn);
        attachPreview.appendChild(item);
    });
}

function _showAttachmentPreview(att) {
    // Remove existing preview overlay
    var existing = document.getElementById('attach-overlay');
    if (existing) existing.remove();

    var overlay = document.createElement('div');
    overlay.id = 'attach-overlay';
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:1000;display:flex;align-items:center;justify-content:center;cursor:pointer;';
    overlay.addEventListener('click', () => overlay.remove());
    document.addEventListener('keydown', function handler(e) {
        if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) { overlay.remove(); document.removeEventListener('keydown', handler); }
    });

    var container = document.createElement('div');
    container.style.cssText = 'background:var(--bg-secondary);border:1px solid var(--border);border-radius:10px;max-width:80vw;max-height:80vh;overflow:auto;padding:16px;position:relative;cursor:default;';
    container.addEventListener('click', (e) => e.stopPropagation());

    // Close button
    var closeBtn = document.createElement('button');
    closeBtn.innerHTML = '&times;';
    closeBtn.style.cssText = 'position:absolute;top:8px;right:12px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;z-index:1;';
    closeBtn.addEventListener('click', () => overlay.remove());
    container.appendChild(closeBtn);

    // Title
    var title = document.createElement('div');
    title.style.cssText = 'font-size:13px;color:var(--fg);font-weight:500;margin-bottom:10px;padding-right:24px;';
    title.textContent = att.name;
    container.appendChild(title);

    // Content
    var isImage = att.type && att.type.startsWith('image/');
    if (isImage && att._url) {
        // Server-hosted image (e.g., from file link click)
        var img = document.createElement('img');
        img.src = att._url;
        img.style.cssText = 'max-width:100%;max-height:70vh;border-radius:6px;';
        container.appendChild(img);
    } else if (isImage && att.data) {
        var img = document.createElement('img');
        img.src = 'data:' + att.type + ';base64,' + att.data;
        img.style.cssText = 'max-width:100%;max-height:70vh;border-radius:6px;';
        container.appendChild(img);
    } else if (isImage && att.preview) {
        var img = document.createElement('img');
        img.src = att.preview;
        img.style.cssText = 'max-width:100%;max-height:70vh;border-radius:6px;';
        container.appendChild(img);
    } else if (att.data) {
        // Text content — decode base64
        try {
            var text = atob(att.data);
            var pre = document.createElement('pre');
            pre.style.cssText = 'margin:0;font-size:12px;color:var(--fg);white-space:pre-wrap;line-height:1.5;max-height:70vh;overflow:auto;background:var(--code-bg);padding:12px;border-radius:6px;';
            pre.textContent = text;
            container.appendChild(pre);
        } catch {
            var p = document.createElement('div');
            p.style.cssText = 'color:var(--muted);font-size:13px;';
            p.textContent = 'Binary file — ' + (att.data.length * 0.75 / 1024).toFixed(1) + ' KB';
            container.appendChild(p);
        }
    }

    overlay.appendChild(container);
    document.body.appendChild(overlay);
}

// --- Image Annotation Editor ---
function _openAnnotator(attIdx) {
    var att = pendingAttachments[attIdx];
    if (!att || !att.preview) return;

    var shapes = [];
    var currentTool = 'arrow';
    var currentColor = '#ff3333';
    var nextNumber = 1;
    var drawing = false, startX = 0, startY = 0;
    var scale = 1; // ratio: natural pixels / displayed pixels

    var COLORS = ['#ff3333', '#33ff33', '#3399ff', '#ffdd00', '#ffffff', '#000000'];
    var TOOLS = [
        {id: 'arrow', label: '\u2197 Arrow'},
        {id: 'line', label: '\u2014 Line'},
        {id: 'circle', label: '\u25cb Circle'},
        {id: 'rect', label: '\u25a1 Rect'},
        {id: 'number', label: '# Number'},
    ];

    // Build overlay
    var overlay = document.createElement('div');
    overlay.className = 'annotate-overlay';

    // Toolbar
    var toolbar = document.createElement('div');
    toolbar.className = 'annotate-toolbar';

    // Tool buttons
    TOOLS.forEach(function(t) {
        var btn = document.createElement('button');
        btn.textContent = t.label;
        btn.className = t.id === currentTool ? 'active' : '';
        btn.addEventListener('click', function() {
            currentTool = t.id;
            toolbar.querySelectorAll('button').forEach(function(b) { b.classList.remove('active'); });
            btn.classList.add('active');
        });
        toolbar.appendChild(btn);
    });

    // Separator
    var sep1 = document.createElement('div'); sep1.className = 'sep'; toolbar.appendChild(sep1);

    // Color dots
    COLORS.forEach(function(c) {
        var dot = document.createElement('div');
        dot.className = 'color-dot' + (c === currentColor ? ' active' : '');
        dot.style.background = c;
        dot.addEventListener('click', function() {
            currentColor = c;
            toolbar.querySelectorAll('.color-dot').forEach(function(d) { d.classList.remove('active'); });
            dot.classList.add('active');
        });
        toolbar.appendChild(dot);
    });

    var sep2 = document.createElement('div'); sep2.className = 'sep'; toolbar.appendChild(sep2);

    // Undo
    var undoBtn = document.createElement('button');
    undoBtn.textContent = '\u21a9 Undo';
    undoBtn.addEventListener('click', function() {
        if (!shapes.length) return;
        var removed = shapes.pop();
        if (removed.type === 'number') nextNumber = Math.max(1, nextNumber - 1);
        redraw();
    });
    toolbar.appendChild(undoBtn);

    // Clear
    var clearBtn = document.createElement('button');
    clearBtn.textContent = '\u2715 Clear';
    clearBtn.addEventListener('click', function() { shapes = []; nextNumber = 1; redraw(); });
    toolbar.appendChild(clearBtn);

    // Spacer
    var spacer = document.createElement('div'); spacer.style.flex = '1'; toolbar.appendChild(spacer);

    // Save
    var saveBtn = document.createElement('button');
    saveBtn.textContent = '\u2713 Save';
    saveBtn.style.cssText = 'background:#1a3a1a;border-color:#3fb950;color:#3fb950;';
    saveBtn.addEventListener('click', function() { saveAndClose(); });
    toolbar.appendChild(saveBtn);

    // Cancel
    var cancelBtn = document.createElement('button');
    cancelBtn.textContent = 'Cancel';
    cancelBtn.addEventListener('click', function() { closeOverlay(); });
    toolbar.appendChild(cancelBtn);

    overlay.appendChild(toolbar);

    // Canvas wrapper
    var wrap = document.createElement('div');
    wrap.className = 'annotate-canvas-wrap';

    // Image canvas (background)
    var imgCanvas = document.createElement('canvas');
    // Draw canvas (annotations, layered on top)
    var drawCanvas = document.createElement('canvas');
    drawCanvas.style.zIndex = '1';

    wrap.appendChild(imgCanvas);
    wrap.appendChild(drawCanvas);
    overlay.appendChild(wrap);

    // Load image
    var img = new Image();
    img.onload = function() {
        var natW = img.naturalWidth, natH = img.naturalHeight;
        // Fit within the available space
        var maxW = wrap.clientWidth - 32, maxH = wrap.clientHeight - 32;
        if (maxW <= 0 || maxH <= 0) { maxW = window.innerWidth - 32; maxH = window.innerHeight - 100; }
        var fitW = natW, fitH = natH;
        if (fitW > maxW) { fitH = fitH * maxW / fitW; fitW = maxW; }
        if (fitH > maxH) { fitW = fitW * maxH / fitH; fitH = maxH; }
        fitW = Math.round(fitW); fitH = Math.round(fitH);
        scale = natW / fitW;

        imgCanvas.width = fitW; imgCanvas.height = fitH;
        drawCanvas.width = fitW; drawCanvas.height = fitH;
        imgCanvas.style.width = fitW + 'px'; imgCanvas.style.height = fitH + 'px';
        drawCanvas.style.width = fitW + 'px'; drawCanvas.style.height = fitH + 'px';

        var ictx = imgCanvas.getContext('2d');
        ictx.drawImage(img, 0, 0, fitW, fitH);
    };
    img.src = att.preview;

    // Drawing helpers
    function _drawArrow(ctx, x1, y1, x2, y2, color) {
        var headLen = 14, dx = x2 - x1, dy = y2 - y1, angle = Math.atan2(dy, dx);
        ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
        ctx.fillStyle = color; ctx.beginPath();
        ctx.moveTo(x2, y2);
        ctx.lineTo(x2 - headLen * Math.cos(angle - 0.4), y2 - headLen * Math.sin(angle - 0.4));
        ctx.lineTo(x2 - headLen * Math.cos(angle + 0.4), y2 - headLen * Math.sin(angle + 0.4));
        ctx.closePath(); ctx.fill();
    }
    function _drawLine(ctx, x1, y1, x2, y2, color) {
        ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    }
    function _drawCircleShape(ctx, cx, cy, rx, ry, color) {
        ctx.strokeStyle = color; ctx.lineWidth = 3;
        ctx.beginPath(); ctx.ellipse(cx, cy, Math.abs(rx), Math.abs(ry), 0, 0, Math.PI * 2); ctx.stroke();
    }
    function _drawRect(ctx, x1, y1, x2, y2, color) {
        ctx.strokeStyle = color; ctx.lineWidth = 3;
        ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
    }
    function _drawNumber(ctx, x, y, num, color) {
        var r = 14;
        ctx.fillStyle = color; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#000'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(String(num), x, y);
    }

    function drawShape(ctx, s) {
        if (s.type === 'arrow') _drawArrow(ctx, s.x1, s.y1, s.x2, s.y2, s.color);
        else if (s.type === 'line') _drawLine(ctx, s.x1, s.y1, s.x2, s.y2, s.color);
        else if (s.type === 'circle') _drawCircleShape(ctx, s.x1, s.y1, Math.abs(s.x2 - s.x1), Math.abs(s.y2 - s.y1), s.color);
        else if (s.type === 'rect') _drawRect(ctx, s.x1, s.y1, s.x2, s.y2, s.color);
        else if (s.type === 'number') _drawNumber(ctx, s.x1, s.y1, s.num, s.color);
    }

    function redraw(preview) {
        var ctx = drawCanvas.getContext('2d');
        ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
        shapes.forEach(function(s) { drawShape(ctx, s); });
        if (preview) drawShape(ctx, preview);
    }

    // Pointer events — drag to draw (touch + mouse)
    function getPos(e) {
        var rect = drawCanvas.getBoundingClientRect();
        return {x: e.clientX - rect.left, y: e.clientY - rect.top};
    }

    // Prevent browser touch gestures on the drawing canvas
    drawCanvas.style.touchAction = 'none';

    drawCanvas.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        var p = getPos(e);
        if (currentTool === 'number') {
            shapes.push({type: 'number', x1: p.x, y1: p.y, color: currentColor, num: nextNumber++});
            redraw();
            return;
        }
        drawing = true; startX = p.x; startY = p.y;
        drawCanvas.setPointerCapture(e.pointerId);
    });

    drawCanvas.addEventListener('pointermove', function(e) {
        if (!drawing) return;
        var p = getPos(e);
        var preview = {type: currentTool, x1: startX, y1: startY, x2: p.x, y2: p.y, color: currentColor};
        redraw(preview);
    });

    drawCanvas.addEventListener('pointerup', function(e) {
        if (!drawing) return;
        drawing = false;
        var p = getPos(e);
        if (Math.abs(p.x - startX) < 3 && Math.abs(p.y - startY) < 3) { redraw(); return; }
        shapes.push({type: currentTool, x1: startX, y1: startY, x2: p.x, y2: p.y, color: currentColor});
        redraw();
    });

    // Save: composite image + annotations at natural resolution
    function saveAndClose() {
        var natW = img.naturalWidth, natH = img.naturalHeight;
        var out = document.createElement('canvas');
        out.width = natW; out.height = natH;
        var octx = out.getContext('2d');
        octx.drawImage(img, 0, 0, natW, natH);
        // Draw shapes scaled to natural resolution
        octx.save();
        octx.scale(scale, scale);
        shapes.forEach(function(s) { drawShape(octx, s); });
        octx.restore();
        // Replace attachment data
        var dataUrl = out.toDataURL('image/png');
        pendingAttachments[attIdx].data = dataUrl.split(',')[1];
        pendingAttachments[attIdx].preview = dataUrl;
        pendingAttachments[attIdx].type = 'image/png';
        refreshAttachmentPreview();
        closeOverlay();
    }

    function closeOverlay() {
        overlay.remove();
        document.removeEventListener('keydown', escHandler);
    }

    var escHandler = function(e) {
        if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) closeOverlay();
    };
    document.addEventListener('keydown', escHandler);
    document.body.appendChild(overlay);

    // Trigger image load after DOM is ready
    requestAnimationFrame(function() {
        if (img.complete && img.naturalWidth) img.onload();
    });
}

// --- Drag and drop ---
let dragCounter = 0;
inputArea.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    inputArea.classList.add('drag-over');
});

const effortHandle = document.createElement('div');

// Click anywhere else on the pill → snap to the nearest step.
effortToggle.addEventListener('click', (ev) => {
    if (ev.target !== effortToggle && ev.target !== effortTrack && ev.target !== effortFill) return;
    const rect = effortToggle.getBoundingClientRect();
    const x = ev.clientX - rect.left;
    const n = EFFORTS.length;
    const step = n > 1 ? Math.round((x / rect.width) * (n - 1)) : 0;
    const clamped = Math.max(0, Math.min(n - 1, step));
    if (clamped === effortIdx) return;
    effortIdx = clamped;
    updateEffortUI();
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({type: 'set_effort', effort: EFFORTS[clamped]}));
    }
});

function updateModeUI() {
    const items = modePopup.querySelectorAll('.mode-item');
    items.forEach((item, i) => {
        item.className = 'mode-item' + (i === modeIdx ? ' active' : '');
        const check = item.querySelector('.mode-check');
        if (check) check.style.display = i === modeIdx ? 'block' : 'none';

    const m = MODES[modeIdx];

    modeBtn.innerHTML = m.icon.replace('width="16"', 'width="14"').replace('height="16"', 'height="14"') + ' <span>' + (labels[m.value] || m.label) + '</span>';
    // Color-code the mode — subtle: only input box border on focus
    var modeColors = {default: '#e67e22', acceptEdits: '#ffffff', plan: '#4a6cf7'};
    var color = modeColors[m.value] || 'var(--border)';
    document.documentElement.style.setProperty('--mode-color', color);
    modeBtn.style.borderColor = '';

    // Refresh send button color — its inline style depends on modeIdx and
    // otherwise stays stale until the next keystroke in the input.
    if (typeof updateSendBtn === 'function') updateSendBtn();

function updateEffortUI() {
    // Fill + handle share a position: 0% at the leftmost step, 100% at
    // the rightmost. For n=5 steps the handle sits at 0/25/50/75/100%.
    const n = EFFORTS.length;
    const pct = n > 1 ? (effortIdx / (n - 1)) * 100 : 0;
    if (effortFill) effortFill.style.width = pct + '%';
    if (effortHandle) effortHandle.style.left = pct + '%';
    // Dots: bright up to and including the active step, dim after.
    if (effortDots) {
        const dots = effortDots.children;
        for (let i = 0; i < dots.length; i++) {
            dots[i].className = 'effort-slider-dot' + (i <= effortIdx ? ' filled' : '');
        }
    }
    // Row label mirrors the slash-menu format: "Effort (Extra high)".
    // Deliberately no model name here — the model picker sits in the
    // same popup so users already know which one is selected.
    const rowLabel = document.getElementById('effort-row-label');
    if (rowLabel) {
        const effName = EFFORT_LABELS[EFFORTS[effortIdx]] || EFFORTS[effortIdx];
        rowLabel.textContent = 'Effort (' + effName + ')';
    }
}

function _showRateLimitPopup() {
    var old = document.getElementById('ratelimit-popup');
    if (old) { old.remove(); return; }

    var popup = document.createElement('div');
    popup.id = 'ratelimit-popup';
    popup.style.cssText = 'position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:20px 24px;min-width:320px;max-width:400px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,0.6);';

    var closeBtn = document.createElement('button');
    closeBtn.innerHTML = '&times;';
    closeBtn.style.cssText = 'position:absolute;top:10px;right:14px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;';
    closeBtn.addEventListener('click', function() { popup.remove(); document.removeEventListener('keydown', esc); });
    popup.appendChild(closeBtn);

    var title = document.createElement('div');
    title.style.cssText = 'font-size:15px;font-weight:600;color:var(--fg);margin-bottom:16px;';
    title.textContent = 'Usage Limits';
    popup.appendChild(title);

    var keys = _rateLimitInfo && typeof _rateLimitInfo === 'object' ? Object.keys(_rateLimitInfo) : [];
    if (keys.length === 0) {
        var noData = document.createElement('div');
        noData.style.cssText = 'color:var(--muted);font-size:13px;';
        noData.textContent = 'No rate limit data yet. Send a message in any session to fetch current limits.';
        popup.appendChild(noData);
    } else {
        // Sort: seven_day first, then five_hour, then others
        keys.sort(function(a, b) {
            var order = {'seven_day': 0, 'seven_day_opus': 0, 'seven_day_sonnet': 1, 'five_hour': 2};
            return (order[a] != null ? order[a] : 9) - (order[b] != null ? order[b] : 9);
        });
        keys.forEach(function(key) {
            var rl = _rateLimitInfo[key];
            var section = document.createElement('div');
            section.style.cssText = 'margin-bottom:14px;';
            var label = (rl.type || key).replace(/_/g, ' ');
            label = label.charAt(0).toUpperCase() + label.slice(1);
            var hasPct = rl.utilization != null;
            var pct = hasPct ? Math.round(rl.utilization * 100) : 0;
            var barColor = pct < 50 ? 'var(--success)' : pct < 80 ? '#c4a000' : pct < 95 ? '#f0a020' : 'var(--error)';
            var status = rl.status || '';
            var statusColor = status === 'allowed' ? 'var(--success)' : status === 'allowed_warning' ? '#c4a000' : '#f0a020';
            var statusLabel = status.replace(/_/g, ' ');

            var html = '<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;">' +
                '<span style="font-size:13px;color:var(--fg);font-weight:500;">' + escHtml(label) + '</span>' +
                '<span style="margin-left:auto;font-size:12px;color:' + statusColor + ';font-weight:500;">' +
                (hasPct ? pct + '%' : statusLabel) + '</span></div>';
            if (hasPct) {
                html += '<div style="height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden;margin-bottom:4px;">' +
                    '<div style="height:100%;width:' + pct + '%;background:' + barColor + ';border-radius:3px;transition:width 0.3s;"></div></div>';
            }
            if (rl.resets_at) {
                var resetDate = new Date(rl.resets_at * 1000);
                var now = Date.now();
                var diffMs = Math.max(0, resetDate - now);
                var diffH = Math.floor(diffMs / 3600000);
                var diffM = Math.floor((diffMs % 3600000) / 60000);
                var resetStr = diffH > 24 ? Math.floor(diffH / 24) + 'd ' + (diffH % 24) + 'h' : diffH + 'h ' + diffM + 'm';
                html += '<div style="font-size:11px;color:var(--muted);">Resets in ' + resetStr + '</div>';
            }
            if (rl.overage_status) {
                html += '<div style="font-size:11px;color:var(--muted);margin-top:2px;">Overage: ' + rl.overage_status.replace(/_/g, ' ') + '</div>';
            }
            section.innerHTML = html;
            popup.appendChild(section);
        });
    }

    var esc = function(e) { if (e.key === 'Escape') { popup.remove(); document.removeEventListener('keydown', esc); } };
    document.addEventListener('keydown', esc);
    document.body.appendChild(popup);
}

function _showStatsPopup() {
    var old = document.getElementById('stats-popup');
    if (old) { old.remove(); return; }

    var fk = function(n) { return n >= 1000000 ? (n/1000000).toFixed(1)+'M' : n >= 1000 ? (n/1000).toFixed(0)+'K' : String(n); };
    var bar = function(val, max, color) {
        var w = Math.min(100, val/max*100);
        return '<div style="height:6px;background:#1a1a2e;border-radius:3px;overflow:hidden;margin-top:4px;"><div style="height:100%;width:'+w+'%;background:'+color+';border-radius:3px;transition:width 0.3s;"></div></div>';
    };
    var durFmt = function(s) { return s >= 3600 ? Math.floor(s/3600)+'h '+Math.floor((s%3600)/60)+'m' : s >= 60 ? Math.floor(s/60)+'m '+s%60+'s' : s+'s'; };
    var row = function(label, value, color) {
        return '<div><div style="color:var(--muted);font-size:11px;margin-bottom:2px;">'+label+'</div><div style="color:'+(color||'var(--fg)')+';font-size:15px;font-weight:500;">'+value+'</div></div>';
    };

    var popup = document.createElement('div');
    popup.id = 'stats-popup';
    popup.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;';
    var card = document.createElement('div');
    card.style.cssText = 'background:#1c2128;border:1px solid var(--border);border-radius:10px;width:440px;max-width:90vw;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,0.5);';
    card.innerHTML = '<div style="padding:16px 18px 12px;display:flex;align-items:center;border-bottom:1px solid #2d333b;">'
        + '<div style="flex:1;font-size:14px;font-weight:600;color:var(--fg);">Session Statistics</div>'
        + '<button id="stats-close" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;border-radius:4px;">&times;</button>'
        + '</div><div id="stats-body" style="padding:16px 18px;"><div style="color:var(--muted);font-size:12px;">Loading...</div></div>';
    popup.appendChild(card);
    popup.addEventListener('click', function(e) { if (e.target === popup) popup.remove(); });
    document.body.appendChild(popup);
    document.getElementById('stats-close').addEventListener('click', function() { popup.remove(); });
    document.addEventListener('keydown', function esc(e) { if (e.key === 'Escape' || e.key === 'Esc' || e.keyCode === 27) { popup.remove(); document.removeEventListener('keydown', esc); } });

    // Fetch session info from API
    var sid = new URLSearchParams(window.location.search).get('session');
    var wsParam = new URLSearchParams(window.location.search).get('ws');
    var baseUrl = wsParam ? wsParam.replace(/^ws/, 'http') : '';
    fetch(baseUrl + '/sessions/' + encodeURIComponent(sid))
        .then(function(r) { return r.json(); })
        .then(function(session) { _renderStats(session); })
        .catch(function() { _renderStats(null); });

    function _renderStats(session) {
        var body = document.getElementById('stats-body');
        if (!body) return;

        // Context window (last turn)
        var lu = _stats.lastUsage || {};
        var ctxTotal = (lu.input||0) + (lu.cacheRead||0) + (lu.cacheCreate||0);
        var ctxPct = Math.min(100, (ctxTotal / MAX_CONTEXT * 100)).toFixed(0);
        var ctxColor = ctxPct < 50 ? 'var(--success)' : ctxPct < 80 ? '#c4a000' : ctxPct < 95 ? '#f0a020' : 'var(--error)';

        // Session duration from server start_time
        var dur = 0;
        if (session && session.start_time) dur = Math.floor(Date.now()/1000 - session.start_time);

        var html = '';

        // === Session info header ===
        if (session) {
            html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;margin-bottom:14px;font-size:12px;">';
            html += row('Session', escHtml(session.name || session.id || sid));
            html += row('Status', '<span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:7px;height:7px;border-radius:50%;background:'+(session.status==='running'?'var(--success)':'#f85149')+';"></span>'+escHtml(session.status||'?')+'</span>');
            html += row('Working directory', '<span style="font-size:11px;word-break:break-all;">'+escHtml(session.cwd||'?')+'</span>');
            html += row('Messages', String(session.message_count||0));
            html += '</div>';
            html += '<div style="height:1px;background:#2d333b;margin:0 0 14px;"></div>';
        }

        // === Context window bar ===
        html += '<div style="margin-bottom:14px;">'
            + '<div style="display:flex;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:2px;"><span>Context Window</span><span style="color:'+ctxColor+';">'+fk(ctxTotal)+' / '+fk(MAX_CONTEXT)+' ('+ctxPct+'%)</span></div>'
            + bar(ctxTotal, MAX_CONTEXT, ctxColor)
            + '</div>';

        // === Last turn token breakdown ===
        html += '<div style="font-size:11px;color:var(--muted);margin-bottom:6px;">Last Turn</div>';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;margin-bottom:14px;">';
        html += row('Input', fk(lu.input||0));
        html += row('Output', fk(lu.output||0));
        html += row('Cache read', fk(lu.cacheRead||0), '#4a6cf7');
        html += row('Cache new', fk(lu.cacheCreate||0), '#c084fc');
        html += '</div>';

        html += '<div style="height:1px;background:#2d333b;margin:0 0 14px;"></div>';

        // === Session totals ===
        html += '<div style="font-size:11px;color:var(--muted);margin-bottom:6px;">Session Totals</div>';
        html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:10px;">';
        html += row('Duration', durFmt(dur));
        html += row('Turns', String(_stats.turns));
        html += row('Est. API cost', '$'+_stats.totalCost.toFixed(2));
        html += '</div>';

        html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">';
        html += row('Context now', fk(totalTokens));
        html += row('Fresh input', fk(_stats.totalInput));
        html += row('Cache reads', fk(_stats.totalCacheRead));
        html += row('Output', fk(_stats.totalOutput));
        html += '</div>';

        // === Resume ID ===
        if (session && session.resume_id) {
            html += '<div style="height:1px;background:#2d333b;margin:14px 0 10px;"></div>';
            html += '<div style="font-size:11px;color:var(--muted);">Resume ID <span style="font-family:monospace;color:var(--fg);user-select:all;">'+escHtml(session.resume_id)+'</span></div>';
        }

        body.innerHTML = html;
    }
}

function updateSlashPopup() {
    var text = promptEl.value;
    // Only open on "/" at start without spaces
    if (!text.startsWith('/') || text.includes(' ') || text.includes('\n')) { closeSlashPopup(); return; }
    var filter = text.toLowerCase();
    var all = _getSlashItems();
    // Filter: keep sections, widgets, and matching items
    _slashFiltered = all.filter(function(c) {
        if (c.section) return true;
        if (c.type) return filter === '/';  // only show widgets when unfiltered
        return c.cmd.startsWith(filter) || c.label.toLowerCase().includes(filter.slice(1));
    });
    // Remove sections with no following items
    var cleaned = [];
    for (var i = 0; i < _slashFiltered.length; i++) {
        if (_slashFiltered[i].section) {
            if (i + 1 < _slashFiltered.length && !_slashFiltered[i + 1].section) cleaned.push(_slashFiltered[i]);
        } else { cleaned.push(_slashFiltered[i]); }
    }
    _slashFiltered = cleaned;
    var actionItems = _slashFiltered.filter(function(c) { return !c.section && !c.type; });
    if (actionItems.length === 0 && _slashFiltered.filter(function(c) { return c.type; }).length === 0) { closeSlashPopup(); return; }
    _slashIdx = 0;
    _renderSlashPopup();
    _slashPopupEl.classList.add('open');
    _slashOpen = true;
}

function _renderSlashPopup() {
    var itemIdx = 0;
    var html = _slashFiltered.map(function(c) {
        if (c.section) return '<div class="slash-section">' + c.section + '</div>';
        if (c.type === 'model') return _renderModelWidget();
        if (c.type === 'effort') return _renderEffortWidget();
        if (c.type === 'thinking') return _renderThinkingWidget();
        var cls = itemIdx === _slashIdx ? 'slash-item selected' : 'slash-item';
        var idx = itemIdx++;
        var right = c.right ? '<span style="margin-left:auto;color:var(--muted);font-size:12px;">' + escHtml(c.right) + '</span>' : '';
        var desc = c.desc ? '<span style="color:var(--muted);font-size:11px;margin-left:6px;">' + escHtml(c.desc) + '</span>' : '';
        return '<div class="' + cls + '" data-idx="' + idx + '">' + escHtml(c.label) + desc + right + '</div>';
    }).join('');
    _slashPopupEl.innerHTML = html;
    // Bind click on action items
    _slashPopupEl.querySelectorAll('.slash-item[data-idx]').forEach(function(el) {
        el.addEventListener('click', function() { _slashIdx = parseInt(el.dataset.idx); _slashSelect(); });
    });
    // Bind effort dots
    _slashPopupEl.querySelectorAll('[data-effort]').forEach(function(el) {
        el.addEventListener('click', function(e) {
            e.stopPropagation();
            effortIdx = parseInt(el.dataset.effort);
            updateEffortUI();
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'set_effort', effort: EFFORTS[effortIdx]}));
            _renderSlashPopup();
        });
    });
    // Bind thinking toggle
    var thinkEl = document.getElementById('slash-thinking-toggle');
    if (thinkEl) {
        thinkEl.addEventListener('click', function(e) {
            e.stopPropagation();
            _thinkingEnabled = !_thinkingEnabled;
            if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({type: 'prompt', text: _thinkingEnabled ? '/think' : '/nothink'}));
            _renderSlashPopup();
        });
    }
    // Bind model switch
    var modelSwitch = document.getElementById('slash-model-switch');
    if (modelSwitch) {
        modelSwitch.addEventListener('click', function(e) {
            e.stopPropagation();
            closeSlashPopup();
            _openModelPicker();
        });
    }
}

function _slashNavigate(dir) {
    var items = _slashFiltered.filter(function(c) { return !c.section && !c.type; });
    if (!items.length) return;
    _slashIdx = (_slashIdx + dir + items.length) % items.length;
    _renderSlashPopup();
}
function _slashSelect() {
    var items = _slashFiltered.filter(function(c) { return !c.section && !c.type; });
    if (_slashIdx >= 0 && _slashIdx < items.length) {
        var cmd = items[_slashIdx];
        promptEl.value = '';
        promptEl.style.height = '38px';
        closeSlashPopup();
        if (cmd.action) cmd.action();
    }
}
function closeSlashPopup() { _slashPopupEl.classList.remove('open'); _slashOpen = false; }
document.addEventListener('click', (e) => {
    if (_slashOpen && !_slashPopupEl.contains(e.target) && e.target !== promptEl && e.target.id !== 'slash-btn') {
        closeSlashPopup();
    }
});

// --- Drag handle (resize input area) ---
dragHandle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const startY = e.clientY;
    const startH = inputArea.offsetHeight;
    _manualResize = true;
    const onMove = (ev) => {
        const h = Math.max(60, startH + (startY - ev.clientY));
        inputArea.style.height = h + 'px';
        promptEl.style.maxHeight = (h - 50) + 'px';
        promptEl.style.height = (h - 50) + 'px';
    };
    const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
});
dragHandle.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const startY = e.touches[0].clientY;
    const startH = inputArea.offsetHeight;
    _manualResize = true;
    const onMove = (ev) => {
        const h = Math.max(60, startH + (startY - ev.touches[0].clientY));
        inputArea.style.height = h + 'px';
        promptEl.style.maxHeight = (h - 50) + 'px';
        promptEl.style.height = (h - 50) + 'px';
    };
    const onEnd = () => {
        document.removeEventListener('touchmove', onMove);
        document.removeEventListener('touchend', onEnd);
    };
    document.addEventListener('touchmove', onMove, {passive: false});
    document.addEventListener('touchend', onEnd);
}, {passive: false});
</script>
