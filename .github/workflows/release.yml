name: Upload release archives

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  archives-and-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create tarball and zip
        run: |
          git archive --format=tar.gz --prefix=be-conductor/ -o be-conductor.tar.gz HEAD
          git archive --format=zip --prefix=be-conductor/ -o be-conductor.zip HEAD

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build VS Code extension
        working-directory: tools/vscode/be-conductor-vscode
        run: npx @vscode/vsce package -o ../../../be-conductor.vsix

      - name: Upload to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            be-conductor.tar.gz be-conductor.zip \
            be-conductor.vsix \
            install.sh uninstall.sh \
            install.ps1 uninstall.ps1 --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  jetbrains:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            tools/jetbrains/be-conductor-plugin/.gradle
            tools/jetbrains/be-conductor-plugin/build
          key: gradle-${{ hashFiles('tools/jetbrains/be-conductor-plugin/**/*.gradle*', 'tools/jetbrains/be-conductor-plugin/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Build JetBrains plugin
        working-directory: tools/jetbrains/be-conductor-plugin
        run: |
          rm -f build/distributions/*.zip
          ./gradlew buildPlugin
          cp build/distributions/be-conductor-plugin-*.zip ../../../be-conductor-jetbrains.zip

      - name: Update updatePlugins.xml with release version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          cat > tools/jetbrains/updatePlugins.xml << XMLEOF
          <?xml version="1.0" encoding="UTF-8"?>
          <plugins>
              <plugin id="com.somniacs.beconductor" url="https://github.com/somniacs/be-conductor/releases/latest/download/be-conductor-jetbrains.zip" version="${VERSION}"/>
          </plugins>
          XMLEOF
          sed -i 's/^          //' tools/jetbrains/updatePlugins.xml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/jetbrains/updatePlugins.xml
          git diff --cached --quiet || git commit -m "Update JetBrains plugin version to ${VERSION}" && git push

      - name: Upload to release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            be-conductor-jetbrains.zip --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
