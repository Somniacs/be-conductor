<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>be-conductor agent</title>
<style>
:root {
    --bg: #0d0d1a;
    --fg: #e0e0e0;
    --bg-secondary: #161b22;
    --border: #30363d;
    --accent: #4a6cf7;
    --success: #3fb950;
    --error: #f85149;
    --muted: #8b949e;
    --code-bg: #0d1117;
    --user-bg: #161b30;
    --tool-bg: #0d1117;
    --tool-header: #161b22;
    --success-bg: #0d1a0d;
    --error-bg: #1a0d0d;
    --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    --font-mono: 'JetBrains Mono', 'Cascadia Mono', Menlo, Consolas, monospace;
}
*, *::before, *::after { box-sizing: border-box; }
body { margin: 0; background: var(--bg); color: var(--fg); font-family: var(--font); font-size: 14px; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
#messages { flex: 1; overflow-y: auto; padding: 12px 16px; min-height: 0; }
#drag-handle { height: 6px; cursor: row-resize; background: var(--bg-secondary); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
#drag-handle div { width: 30px; height: 2px; background: var(--border); border-radius: 1px; }
#input-area { flex-shrink: 0; background: var(--bg-secondary); border-top: 1px solid var(--border); padding: 8px 12px; position: relative; }
#input-box { display: flex; flex-direction: column; background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; padding: 0; }
#input-toolbar { display: flex; align-items: center; gap: 0; padding: 2px 4px; border-top: 1px solid var(--border); border-radius: 0 0 10px 10px; }
#prompt { width: 100%; resize: none; background: transparent; color: var(--fg); border: none; outline: none; padding: 8px 12px; font-family: inherit; font-size: 13px; height: 38px; line-height: 1.4; overflow: hidden; }
.attach-btn, .mode-btn, .send-btn { flex-shrink: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.attach-btn { background: none; border: none; color: var(--muted); padding: 6px; border-radius: 6px; }
.attach-btn:hover { color: var(--fg); background: #1a1f2b; }
.mode-btn { background: none; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 11px; gap: 4px; white-space: nowrap; position: relative; }
.mode-btn:hover { color: var(--fg); border-color: #666; }
.send-btn { background: #2563eb; color: white; border: none; border-radius: 6px; width: 32px; height: 28px; padding: 4px 0; transition: background 0.15s, opacity 0.15s; }
.send-btn:hover { background: #3b82f6; }
.send-btn.busy { background: #1a1a1a; border: 1px solid #444; }
.send-btn.busy:hover { background: #2a2a2a; }
.send-btn.queued { background: #b45309; }
.send-btn.queued:hover { background: #d97706; }
.send-btn.disabled { background: #333; opacity: 0.4; cursor: default; }
.send-btn.disabled:hover { background: #333; }
.agent-spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--muted); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.right-group { display: flex; align-items: center; gap: 4px; flex-shrink: 0; position: relative; }
.mode-popup { display: none; position: absolute; bottom: 100%; right: 0; margin-bottom: 8px; background: #1c2028; border: 1px solid var(--border); border-radius: 10px; padding: 8px 0; min-width: 300px; z-index: 100; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
.mode-item { padding: 8px 14px; cursor: pointer; display: flex; align-items: flex-start; gap: 10px; }
.mode-item:hover { background: #2a2f3a; }
.mode-item.active { background: #1a2744; }
.effort-toggle { display: flex; gap: 2px; background: var(--code-bg); border-radius: 8px; padding: 2px; border: 1px solid var(--border); }
.effort-btn { background: transparent; color: var(--muted); border: none; border-radius: 6px; padding: 2px 8px; font-size: 11px; cursor: pointer; font-weight: 500; }
.effort-btn.active { background: #2563eb; color: white; }
.attachment-preview { display: none; gap: 6px; padding: 4px 8px; flex-shrink: 0; overflow-x: auto; flex-wrap: wrap; }
.drag-over #input-box { border-color: #4a6cf7 !important; background: #1a2744 !important; }
.drag-over::after { content: 'Drop files here'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(26,39,68,0.9); color: #4a6cf7; font-size: 14px; font-weight: 500; border-radius: 10px; pointer-events: none; z-index: 10; }
.attachment-item { position: relative; display: flex; align-items: center; gap: 4px; padding: 4px 8px; background: #1a1a2e; border: 1px solid #333; border-radius: 6px; font-size: 11px; color: #a0a0d0; }
.attachment-item img { max-height: 40px; max-width: 60px; border-radius: 3px; object-fit: cover; }
.attachment-item .remove-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 14px; padding: 0 2px; line-height: 1; }
.attachment-item .remove-btn:hover { color: #ff6666; }
.file-link { color: var(--accent); text-decoration: none; }
.file-link:hover { text-decoration: underline; }
/* Context indicator */
.context-indicator { cursor: pointer; display: flex; align-items: center; padding: 2px; border-radius: 4px; }
.context-indicator:hover { background: var(--border); }
/* Message spacing */
.msg { margin: 12px 0; }
#messages::-webkit-scrollbar { width: 8px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
</style>
</head>
<body>

<div id="messages"></div>
<div id="drag-handle"><div></div></div>
<div id="input-area">
    <div class="attachment-preview" id="attach-preview"></div>
    <div id="input-box">
        <textarea id="prompt" rows="1" placeholder="Message Claude..."></textarea>
        <div id="input-toolbar">
            <button class="attach-btn" id="attach-btn" title="Attach file or image">
                <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/></svg>
            </button>
            <div style="flex:1;"></div>
            <div class="right-group" id="right-group">
                <div class="mode-popup" id="mode-popup"></div>
                <button class="mode-btn" id="mode-btn" title="Modes &amp; Effort"></button>
                <div class="context-indicator" id="context-indicator" title="Context window usage">
                    <svg width="16" height="16" viewBox="0 0 16 16"><circle cx="8" cy="8" r="6" fill="none" stroke="var(--border)" stroke-width="2"/><circle cx="8" cy="8" r="6" fill="none" stroke="var(--muted)" stroke-width="2" stroke-dasharray="37.7" stroke-dashoffset="37.7" id="context-ring" transform="rotate(-90 8 8)"/></svg>
                </div>
                <button class="send-btn" id="send-btn" title="Send (Enter)"></button>
            </div>
        </div>
    </div>
</div>
<input type="file" id="file-input" multiple style="display:none" accept="image/*,.txt,.csv,.json,.md,.py,.js,.ts,.html,.css,.xml,.yaml,.yml,.toml,.sh,.log">

<script>
// --- Configuration ---
const params = new URLSearchParams(location.search);
const SESSION_ID = params.get('session') || window.__SESSION_ID || '';
const WS_BASE = params.get('ws') || window.__WS_BASE || location.origin.replace(/^http/, 'ws');

// --- Theme ---
const THEMES = {
    default: {
        bg: '#12122a', fg: '#d0d0e0', secondary: '#1a1a3a', border: '#2a2a5a',
        accent: '#7c8cff', muted: '#8888bb', codeBg: '#0a0a20',
        userBg: '#1a1a44', toolBg: '#141430', toolHeader: '#1a1a3a',
        successBg: '#0a1a0a', errorBg: '#1a0a0a',
    },
    dark: {
        bg: '#0a0a0a', fg: '#c8c8c8', secondary: '#141414', border: '#2a2a2a',
        accent: '#6699dd', muted: '#777777', codeBg: '#060606',
        userBg: '#111122', toolBg: '#0e0e0e', toolHeader: '#161616',
        successBg: '#0a120a', errorBg: '#120a0a',
    },
    mid: {
        bg: '#1e1e2e', fg: '#cdd6f4', secondary: '#262640', border: '#45475a',
        accent: '#89b4fa', muted: '#a6adc8', codeBg: '#181825',
        userBg: '#232345', toolBg: '#1c1c30', toolHeader: '#262640',
        successBg: '#1a2a1a', errorBg: '#2a1a1a',
    },
    bright: {
        bg: '#ffffff', fg: '#24292f', secondary: '#f6f8fa', border: '#d0d7de',
        accent: '#0969da', muted: '#656d76', codeBg: '#f0f2f5',
        userBg: '#ddf4ff', toolBg: '#f6f8fa', toolHeader: '#eaeef2',
        successBg: '#dafbe1', errorBg: '#ffebe9',
    },
    bernstein: {
        bg: '#1a0e00', fg: '#ffb000', secondary: '#241400', border: '#4a2800',
        accent: '#ffc040', muted: '#996600', codeBg: '#120800',
        userBg: '#241800', toolBg: '#1e1000', toolHeader: '#2a1800',
        successBg: '#1a1400', errorBg: '#1a0800',
    },
    green: {
        bg: '#001a00', fg: '#33ff00', secondary: '#002200', border: '#0a4400',
        accent: '#44ff22', muted: '#1a8800', codeBg: '#001200',
        userBg: '#002800', toolBg: '#001e00', toolHeader: '#003000',
        successBg: '#002a00', errorBg: '#1a0a00',
    },
};
const root = document.documentElement;
function applyTheme(t) {
    root.style.setProperty('--bg', t.bg);
    root.style.setProperty('--fg', t.fg);
    root.style.setProperty('--bg-secondary', t.secondary);
    root.style.setProperty('--border', t.border);
    root.style.setProperty('--accent', t.accent);
    root.style.setProperty('--muted', t.muted);
    root.style.setProperty('--code-bg', t.codeBg);
    root.style.setProperty('--user-bg', t.userBg);
    root.style.setProperty('--tool-bg', t.toolBg);
    root.style.setProperty('--tool-header', t.toolHeader);
    root.style.setProperty('--success-bg', t.successBg);
    root.style.setProperty('--error-bg', t.errorBg);
}
const themeName = params.get('theme') || window.__THEME || 'default';
applyTheme(THEMES[themeName] || THEMES.default);
window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'setTheme' && THEMES[e.data.theme]) applyTheme(THEMES[e.data.theme]);
});

// --- IDE Bridge ---
const ideBridge = {
    openFile(path, line) {},
    pickFile() {},
    showDiff(path, oldText, newText) {},
    runInTerminal(cmd) {},
    _onFileData: null,
};

// Detect JetBrains (JCEF or HTMLEditorProvider)
const _isJetBrains = navigator.userAgent.includes('JBCef') || document.documentElement.getAttribute('data-jb-editor') !== null;

if (typeof window.cefQuery === 'function') {
    // JetBrains JCEF with registered queries
    ideBridge.openFile = (p, l) => window.cefQuery({request: JSON.stringify({type:'openFile', path:p, line:l||0})});
    ideBridge.pickFile = () => window.cefQuery({request: JSON.stringify({type:'pickFile'})});
    ideBridge.runInTerminal = (cmd) => window.cefQuery({request: JSON.stringify({type:'runInTerminal', command:cmd})});
} else if (typeof acquireVsCodeApi !== 'undefined') {
    // VSCode webview
    const vscode = acquireVsCodeApi();
    ideBridge.openFile = (p, l) => vscode.postMessage({type:'openFile', path:p, line:l||0});
    ideBridge.pickFile = () => vscode.postMessage({type:'pickFile'});
    ideBridge.runInTerminal = (cmd) => vscode.postMessage({type:'runInTerminal', command:cmd});
    window.addEventListener('message', e => {
        if (e.data && e.data.type === 'fileData' && ideBridge._onFileData) {
            ideBridge._onFileData(e.data);
        }
    });
} else if (_isJetBrains || (window.parent === window && location.protocol === 'http:' && navigator.userAgent.includes('CEF'))) {
    // JetBrains HTMLEditorProvider — use REST API to open files
    ideBridge.openFile = (p, l) => {
        // Use JetBrains built-in REST API (available on localhost:63342)
        const line = l || 0;
        fetch(`http://localhost:63342/api/file/${encodeURIComponent(p)}?line=${line}&column=0`, {mode:'no-cors'}).catch(() => {});
    };
} else if (window.parent !== window) {
    // Embedded in dashboard iframe
    ideBridge.openFile = (p, l) => window.parent.postMessage({type:'openFile', path:p, line:l||0, session: SESSION_ID}, '*');
}

// --- DOM refs ---
const messagesEl = document.getElementById('messages');
const promptEl = document.getElementById('prompt');
const sendBtn = document.getElementById('send-btn');
const attachBtn = document.getElementById('attach-btn');
const fileInput = document.getElementById('file-input');
const attachPreview = document.getElementById('attach-preview');
const modeBtn = document.getElementById('mode-btn');
const modePopup = document.getElementById('mode-popup');
const dragHandle = document.getElementById('drag-handle');
const inputArea = document.getElementById('input-area');
const contextRing = document.getElementById('context-ring');
const contextIndicator = document.getElementById('context-indicator');
const MAX_CONTEXT = 1000000; // 1M tokens (Opus)
let totalTokens = 0;

function updateContextRing(usage) {
    if (!usage) return;
    const input = Number(usage.input_tokens || usage.inputTokens || 0);
    const output = Number(usage.output_tokens || usage.outputTokens || 0);
    const cache = Number(usage.cache_read_input_tokens || usage.cacheReadInputTokens || 0);
    totalTokens = input + output;
    const pct = Math.min(1, totalTokens / MAX_CONTEXT);
    const circumference = 37.7;
    const offset = circumference * (1 - pct);
    if (contextRing) {
        contextRing.style.strokeDashoffset = offset;
        const color = pct < 0.5 ? 'var(--success)' : pct < 0.8 ? '#c4a000' : pct < 0.95 ? '#f0a020' : 'var(--error)';
        contextRing.style.stroke = color;
    }
    const k = (totalTokens / 1000).toFixed(0);
    const pctStr = (pct * 100).toFixed(0);
    if (contextIndicator) {
        contextIndicator.title = `Context: ${k}K / ${MAX_CONTEXT/1000}K tokens (${pctStr}%)${cache ? '\nCache: ' + (cache/1000).toFixed(0) + 'K' : ''}`;
    }
}

if (contextIndicator) {
    contextIndicator.addEventListener('click', () => {
        if (ws && ws.readyState === WebSocket.OPEN && totalTokens > 0) {
            ws.send(JSON.stringify({type: 'prompt', text: '/compact'}));
            setBusy(true);
        }
    });
}

// --- State ---
let busy = false;
let ws = null;
let _replayingHistory = false;
let _userDismissedQuestion = false;
let retryCount = 0;
const MAX_RETRIES = 10;
const pendingAttachments = [];

const SEND_ICON = '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 12V4M4 7l4-4 4 4"/></svg>';
const STOP_ICON = '<svg width="10" height="10" viewBox="0 0 10 10"><rect width="10" height="10" rx="1.5" fill="white"/></svg>';

// --- Rendering helpers (copied from dashboard) ---
function escHtml(s) {
    if (typeof s !== 'string') return '';
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function _mdToHtml(text) {
    if (!text) return '';
    let h = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // Fenced code blocks
    h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
        const label = lang ? `<div style="font-size:11px;color:#666;padding:4px 10px;background:var(--tool-header);border-radius:6px 6px 0 0;border-bottom:1px solid var(--border);">${lang}</div>` : '';
        return `<div style="margin:8px 0;border-radius:6px;overflow:hidden;border:1px solid var(--border);">${label}<pre style="margin:0;padding:10px 12px;background:var(--code-bg);overflow-x:auto;font-size:13px;line-height:1.45;color:var(--fg);"><code>${code}</code></pre></div>`;
    });
    // Tables: detect lines starting with |
    h = h.replace(/((?:^\|.+\|$\n?)+)/gm, (tableBlock) => {
        const rows = tableBlock.trim().split('\n').filter(r => r.trim());
        if (rows.length < 2) return tableBlock;
        let html = '<table style="margin:8px 0;border-collapse:collapse;width:100%;font-size:13px;">';
        rows.forEach((row, i) => {
            // Skip separator row (|---|---|)
            if (/^\|[\s-:|]+\|$/.test(row.trim())) return;
            const cells = row.split('|').filter((c, j, a) => j > 0 && j < a.length - 1);
            const tag = i === 0 ? 'th' : 'td';
            const bgStyle = i === 0 ? 'background:var(--tool-header);font-weight:600;' : (i % 2 === 0 ? 'background:var(--code-bg);' : '');
            html += '<tr>';
            cells.forEach(cell => {
                html += `<${tag} style="padding:6px 10px;border:1px solid #30363d;text-align:left;${bgStyle}">${cell.trim()}</${tag}>`;
            });
            html += '</tr>';
        });
        html += '</table>';
        return html;
    });
    // Inline code
    h = h.replace(/`([^`]+)`/g, '<code style="background:var(--tool-bg);padding:2px 5px;border-radius:3px;font-size:0.9em;color:var(--fg);">$1</code>');
    // Bold
    h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic
    h = h.replace(/\*(.+?)\*/g, '<em>$1</em>');
    // Headers
    h = h.replace(/^### (.+)$/gm, '<div style="font-size:15px;font-weight:600;color:var(--fg);margin:12px 0 4px;">$1</div>');
    h = h.replace(/^## (.+)$/gm, '<div style="font-size:16px;font-weight:600;color:var(--fg);margin:14px 0 6px;">$1</div>');
    h = h.replace(/^# (.+)$/gm, '<div style="font-size:18px;font-weight:600;color:var(--fg);margin:16px 0 8px;">$1</div>');
    // Lists
    h = h.replace(/^- (.+)$/gm, '<div style="padding-left:16px;">&#8226; $1</div>');
    h = h.replace(/^(\d+)\. (.+)$/gm, '<div style="padding-left:16px;">$1. $2</div>');
    // Paragraphs
    h = h.replace(/\n\n/g, '<div style="height:8px;"></div>');
    h = h.replace(/\n/g, '<br>');
    // Make file paths clickable
    h = makeFileLinksClickable(h);
    return h;
}

function _toolIcon(name) {
    const s = 'width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"';
    const icons = {
        'Bash': `<svg ${s}><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 6l2 2-2 2M9 10h2"/></svg>`,
        'Read': `<svg ${s}><path d="M3 2h7l3 3v9H3z"/><path d="M10 2v3h3"/></svg>`,
        'Write': `<svg ${s}><path d="M3 2h7l3 3v9H3z"/><path d="M10 2v3h3"/><path d="M6 9h4"/></svg>`,
        'Edit': `<svg ${s}><path d="M11 2l3 3-9 9H2v-3z"/></svg>`,
        'Glob': `<svg ${s}><circle cx="7" cy="7" r="4"/><path d="M10 10l4 4"/></svg>`,
        'Grep': `<svg ${s}><circle cx="7" cy="7" r="4"/><path d="M10 10l4 4"/></svg>`,
        'WebFetch': `<svg ${s}><circle cx="8" cy="8" r="6"/><path d="M2 8h12M8 2c-2 2-2 10 0 12M8 2c2 2 2 10 0 12"/></svg>`,
        'WebSearch': `<svg ${s}><circle cx="8" cy="8" r="6"/><path d="M2 8h12M8 2c-2 2-2 10 0 12M8 2c2 2 2 10 0 12"/></svg>`,
        'Agent': `<svg ${s}><circle cx="8" cy="5" r="3"/><path d="M3 14c0-3 2-5 5-5s5 2 5 5"/></svg>`,
        'TodoWrite': `<svg ${s}><rect x="3" y="2" width="10" height="12" rx="1"/><path d="M6 6l1.5 1.5L10 5M6 10h4"/></svg>`,
    };
    return icons[name] || `<svg ${s}><circle cx="8" cy="8" r="5"/><path d="M8 5v3l2 1"/></svg>`;
}

function _basename(p) { return p ? p.split('/').pop() : ''; }
function _toolInputSummary(name, input) {
    if (!input) return '';
    if (name === 'Bash' && input.command) return input.command;
    if (name === 'Read' && input.file_path) return _basename(input.file_path);
    if (name === 'Write' && input.file_path) return _basename(input.file_path);
    if (name === 'Edit' && input.file_path) return _basename(input.file_path);
    if (name === 'Glob' && input.pattern) return input.pattern;
    if (name === 'Grep' && input.pattern) return input.pattern;
    if (name === 'WebFetch' && input.url) return input.url;
    if (name === 'WebSearch' && input.query) return input.query;
    try { return JSON.stringify(input).slice(0, 120); } catch { return ''; }
}

function makeFileLinksClickable(html) {
    // Match absolute paths (/foo/bar.txt), relative paths (foo/bar.txt), and filenames with extensions
    // Skip if already inside an HTML tag or link
    return html.replace(/(?<![="\/\w])(((?:\.\.?\/|\/|[\w-]+\/)[\w./-]+\.[\w]+|[\w.-]+\.(?:txt|py|js|ts|json|md|yml|yaml|toml|sh|css|html|xml|csv|log|cfg|conf|rs|go|java|cpp|c|h|hpp|cu|glsl|vert|frag|png|jpg|jpeg|gif|svg|pdf))(?::(\d+))?)/g, (match, full, path, ext, line) => {
        const cleanPath = full.split(':')[0];
        return `<a class="file-link" href="#" onclick="ideBridge.openFile('${cleanPath}', ${line || 0}); return false;">${match}</a>`;
    });
}

// --- Event renderer (pixel-identical to dashboard) ---
function renderEvent(event) {
    const ph = messagesEl.querySelector('[data-placeholder]');
    if (ph) ph.remove();
    const etype = event.type;

    if (etype === 'user_message') {
        // Only dismiss question modal if the user answered (not SDK auto-answer)
        // SDK auto-answers have no UI interaction — _userDismissedQuestion is set by sendPrompt
        const openModal = document.getElementById('question-modal');
        if (openModal && _userDismissedQuestion) {
            openModal.remove();
            const inputBox = document.getElementById('input-box');
            const handle = document.getElementById('drag-handle');
            if (inputBox) inputBox.style.display = '';
            if (handle) handle.style.display = '';
            _userDismissedQuestion = false;
        }
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<div style="padding:10px 14px;background:var(--user-bg);border-radius:8px;border-left:3px solid var(--accent);white-space:pre-wrap;line-height:1.5;">${escHtml(event.content || '')}</div>`;
        messagesEl.appendChild(div);

    } else if (etype === 'assistant_message') {
        if (!busy) setBusy(true);
        if (event.usage) updateContextRing(event.usage);
        const blocks = event.content || [];
        const hasVisibleContent = blocks.some(b => b.type !== 'tool_use' || b.tool !== 'AskUserQuestion');
        if (!hasVisibleContent) {
            // Only AskUserQuestion — handle modals, skip rendering
            for (const block of blocks) {
                if (block.type === 'tool_use' && block.tool === 'AskUserQuestion' && !_replayingHistory) {
                    (block.input.questions || [block.input]).forEach(q => {
                        showQuestionModal(q, (answer) => { promptEl.value = answer; sendPrompt(); });
                    });
                }
            }
            autoScroll();
            return;
        }
        const wrapper = document.createElement('div');
        wrapper.className = 'msg';

        for (const block of blocks) {
            if (block.type === 'text') {
                const div = document.createElement('div');
                div.style.cssText = 'line-height:1.6;color:#e0e0e0;';
                div.innerHTML = _mdToHtml(block.text);
                wrapper.appendChild(div);

            } else if (block.type === 'thinking') {
                const details = document.createElement('details');
                details.style.cssText = 'margin:8px 0;border:1px solid var(--border);border-radius:6px;overflow:hidden;';
                const summary = document.createElement('summary');
                summary.style.cssText = 'padding:6px 10px;background:var(--tool-header);color:var(--muted);font-size:13px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px;';
                const thinkLen = (block.thinking || '').length;
                const thinkSec = busyStartTime ? Math.round((Date.now() - busyStartTime) / 1000) : 0;
                summary.innerHTML = `<span style="color:#e0e0e0;">&#x25CF;</span> Thought for ${thinkSec || '?'}s <span style="color:#666;">&#x203A;</span>`;
                const content = document.createElement('div');
                content.style.cssText = 'padding:8px 10px;font-size:12px;color:var(--muted);white-space:pre-wrap;max-height:300px;overflow-y:auto;';
                content.textContent = block.thinking || '';
                details.appendChild(summary);
                details.appendChild(content);
                wrapper.appendChild(details);

            } else if (block.type === 'tool_use' && block.tool === 'AskUserQuestion') {
                // Handled above — skip rendering

            } else if (block.type === 'tool_use') {
                const details = document.createElement('details');
                details.style.cssText = 'margin:8px 0;border:1px solid #30363d;border-radius:6px;overflow:hidden;';
                const summary = document.createElement('summary');
                summary.style.cssText = 'padding:8px 12px;background:var(--tool-header);color:var(--fg);font-size:13px;cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px;';
                const toolName = block.tool || 'tool';
                const inputSummary = _toolInputSummary(toolName, block.input);
                summary.innerHTML = `<span>${_toolIcon(toolName)}</span><strong style="color:var(--accent);">${escHtml(toolName)}</strong><span style="color:var(--muted);font-weight:400;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${makeFileLinksClickable(escHtml(inputSummary))}</span>`;
                const content = document.createElement('div');
                content.style.cssText = 'padding:8px 12px;background:var(--tool-bg);';
                const pre = document.createElement('pre');
                pre.style.cssText = 'margin:0;font-size:12px;color:var(--muted);overflow-x:auto;max-height:200px;white-space:pre-wrap;line-height:1.4;';
                try { pre.textContent = JSON.stringify(block.input, null, 2); } catch { pre.textContent = String(block.input); }
                content.appendChild(pre);
                details.appendChild(summary);
                details.appendChild(content);
                wrapper.appendChild(details);

            } else if (block.type === 'tool_result') {
                const div = document.createElement('div');
                const isErr = block.is_error;
                div.style.cssText = `margin:4px 0 8px 0;padding:8px 12px;background:var(--tool-bg);border-radius:0 0 6px 6px;border-top:1px solid ${isErr ? 'var(--error)' : 'var(--border)'};font-size:12px;color:${isErr ? 'var(--error)' : 'var(--muted)'};max-height:300px;overflow-y:auto;white-space:pre-wrap;line-height:1.4;`;
                const raw = String(block.content || '');
                const truncated = raw.length > 3000 ? raw.slice(0, 3000) + '\n...(truncated)' : raw;
                div.innerHTML = makeFileLinksClickable(escHtml(truncated));
                wrapper.appendChild(div);
            }
        }
        messagesEl.appendChild(wrapper);

    } else if (etype === 'question') {
        if (_replayingHistory) return;
        setBusy(false);
        showQuestionModal(event, (answer) => {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'answer', text: answer}));
            }
            setBusy(true);
        });

    } else if (etype === 'result') {
        setBusy(false);
        if (event.usage) updateContextRing(event.usage);

    } else if (etype === 'error') {
        setBusy(false);
        const div = document.createElement('div');
        div.className = 'msg';
        div.innerHTML = `<div style="padding:10px 14px;background:var(--error-bg);border:1px solid var(--error);border-radius:8px;color:var(--error);font-size:13px;"><strong>Error</strong> &mdash; ${escHtml(event.error || 'Unknown error')}</div>`;
        messagesEl.appendChild(div);

    } else if (etype === 'session_end') {
        setBusy(false);
        // Don't render — the session list already shows status
    }

    autoScroll();
}


function autoScroll() {
    // Keep spinner at the very bottom
    if (spinnerEl && spinnerEl.parentNode === messagesEl) {
        messagesEl.appendChild(spinnerEl);
    }
    if (messagesEl.scrollHeight - messagesEl.scrollTop - messagesEl.clientHeight < 100) {
        messagesEl.scrollTop = messagesEl.scrollHeight;
    }
}

// --- Question modal ---
function showQuestionModal(q, onAnswer) {
    const inputArea = document.getElementById('input-area');
    const inputBox = document.getElementById('input-box');
    const handle = document.getElementById('drag-handle');

    // Remove any existing modal
    const old = document.getElementById('question-modal');
    if (old) old.remove();

    // Hide normal input + drag handle
    if (inputBox) inputBox.style.display = 'none';
    if (handle) handle.style.display = 'none';

    // Scroll messages to bottom
    messagesEl.scrollTop = messagesEl.scrollHeight;

    // Build modal as the input area content
    const modal = document.createElement('div');
    modal.id = 'question-modal';
    modal.style.cssText = 'padding:14px 16px;overflow-y:auto;border-top:2px solid var(--accent);position:relative;';

    // Close button (top-right X)
    const closeBtn = document.createElement('button');
    closeBtn.innerHTML = '&times;';
    closeBtn.style.cssText = 'position:absolute;top:8px;right:10px;background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:2px 6px;line-height:1;border-radius:4px;';
    closeBtn.addEventListener('mouseover', () => { closeBtn.style.color = 'var(--fg)'; closeBtn.style.background = 'var(--border)'; });
    closeBtn.addEventListener('mouseout', () => { closeBtn.style.color = 'var(--muted)'; closeBtn.style.background = 'none'; });
    closeBtn.addEventListener('click', () => dismiss('cancelled'));
    modal.appendChild(closeBtn);

    // Header
    if (q.header) {
        const hdr = document.createElement('div');
        hdr.style.cssText = 'font-size:11px;color:var(--muted);margin-bottom:4px;font-weight:500;';
        hdr.textContent = q.header;
        modal.appendChild(hdr);
    }

    // Question text
    const qText = document.createElement('div');
    qText.style.cssText = 'color:var(--fg);line-height:1.5;font-size:14px;margin-bottom:10px;';
    qText.innerHTML = _mdToHtml(q.question || q.text || '');
    modal.appendChild(qText);

    function dismiss(answer) {
        modal.remove();
        if (inputBox) inputBox.style.display = '';
        if (handle) handle.style.display = '';
        document.removeEventListener('keydown', escHandler);
        // Scroll to bottom after answer
        setTimeout(() => { messagesEl.scrollTop = messagesEl.scrollHeight; }, 100);
        onAnswer(answer);
    }

    // Options
    const opts = q.options || q.choices || [];
    if (opts.length) {
        opts.forEach(opt => {
            const label = typeof opt === 'string' ? opt : (opt.label || opt.value || String(opt));
            const desc = typeof opt === 'object' ? (opt.description || '') : '';
            const value = typeof opt === 'string' ? opt : (opt.value || opt.label || String(opt));
            const btn = document.createElement('button');
            btn.style.cssText = 'background:var(--code-bg);color:var(--fg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;cursor:pointer;font-size:13px;text-align:left;display:flex;align-items:center;gap:10px;margin-bottom:4px;width:100%;';
            btn.innerHTML = `<span style="width:16px;height:16px;border:2px solid var(--accent);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;"></span><div><div>${escHtml(label)}</div>${desc ? `<div style="font-size:11px;color:var(--muted);margin-top:2px;">${escHtml(desc)}</div>` : ''}</div>`;
            btn.addEventListener('mouseover', () => { btn.style.borderColor = 'var(--accent)'; });
            btn.addEventListener('mouseout', () => { btn.style.borderColor = 'var(--border)'; });
            btn.addEventListener('click', () => {
                modal.querySelectorAll('button').forEach(b => { b.style.opacity = '0.4'; b.style.pointerEvents = 'none'; });
                btn.style.opacity = '1'; btn.style.borderColor = 'var(--accent)';
                btn.querySelector('span').innerHTML = '<span style="width:8px;height:8px;border-radius:50%;background:var(--accent);display:block;"></span>';
                setTimeout(() => dismiss(value), 250);
            });
            modal.appendChild(btn);
        });
    }

    // Free-text input — only show when there are no options
    let freeInput = null;
    if (!opts.length) {
        const freeRow = document.createElement('div');
        freeRow.style.cssText = 'display:flex;gap:6px;margin-top:8px;align-items:center;';
        freeInput = document.createElement('input');
        freeInput.type = 'text';
        freeInput.placeholder = 'Type your answer...';
        freeInput.style.cssText = 'flex:1;background:var(--code-bg);color:var(--fg);border:1px solid var(--border);border-radius:6px;padding:8px 10px;font-size:13px;outline:none;';
        freeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && freeInput.value.trim()) dismiss(freeInput.value.trim());
        });
        const submitBtn = document.createElement('button');
        submitBtn.textContent = 'Submit';
        submitBtn.style.cssText = 'background:var(--accent);color:white;border:none;border-radius:6px;padding:8px 14px;cursor:pointer;font-size:13px;';
        submitBtn.addEventListener('click', () => {
            if (freeInput.value.trim()) dismiss(freeInput.value.trim());
        });
        freeRow.appendChild(freeInput);
        freeRow.appendChild(submitBtn);
        modal.appendChild(freeRow);
    }

    // Esc hint
    const escHint = document.createElement('div');
    escHint.style.cssText = 'font-size:11px;color:var(--muted);margin-top:6px;opacity:0.6;';
    escHint.textContent = 'Esc to cancel';
    modal.appendChild(escHint);

    const escHandler = (e) => {
        if (e.key === 'Escape') dismiss('cancelled');
    };
    document.addEventListener('keydown', escHandler);

    inputArea.appendChild(modal);
    if (freeInput) freeInput.focus();
}

// --- Busy state ---
// Spinner element (shown at bottom of messages when busy)
let spinnerEl = null;
let busyStartTime = 0;
let spinnerInterval = null;

function setBusy(b) {
    busy = b;
    updateSendBtn();
    promptEl.placeholder = b ? 'Queue another message...' : 'Message Claude...';
    const _verbs = ['Composing', 'Orchestrating', 'Harmonizing', 'Conducting', 'Arranging', 'Counterpointing', 'Modulating', 'Embellishing', 'Transposing', 'Cadencing', 'Ornamenting', 'Fuguing', 'Preluding', 'Tempering'];
    if (b) {
        busyStartTime = Date.now();
        if (!spinnerEl) {
            spinnerEl = document.createElement('div');
            spinnerEl.style.cssText = 'padding:8px 0;color:var(--muted);font-size:13px;display:flex;align-items:center;gap:8px;';
            spinnerEl.innerHTML = '<span class="agent-spinner"></span><span class="spinner-text"></span>';
            messagesEl.appendChild(spinnerEl);
        }
        let verbIdx = Math.floor(Math.random() * _verbs.length);
        const updateSpinner = () => {
            if (!spinnerEl) return;
            const s = Math.round((Date.now() - busyStartTime) / 1000);
            const verb = _verbs[verbIdx % _verbs.length];
            spinnerEl.querySelector('.spinner-text').textContent = `${verb}... ${s}s`;
        };
        updateSpinner();
        spinnerInterval = setInterval(() => {
            // Change verb every 5 seconds
            const s = Math.round((Date.now() - busyStartTime) / 1000);
            if (s > 0 && s % 5 === 0) verbIdx++;
            updateSpinner();
        }, 1000);
        autoScroll();
    } else {
        if (spinnerEl) { spinnerEl.remove(); spinnerEl = null; }
        if (spinnerInterval) { clearInterval(spinnerInterval); spinnerInterval = null; }
    }
}

function updateSendBtn() {
    const hasText = promptEl.value.trim().length > 0;
    if (busy && !hasText) {
        // Busy, no text → stop button
        sendBtn.innerHTML = STOP_ICON;
        sendBtn.className = 'send-btn busy';
        sendBtn.title = 'Stop (Esc)';
    } else if (busy && hasText) {
        // Busy, has text → send (queue) button, orange to indicate queued
        sendBtn.innerHTML = SEND_ICON;
        sendBtn.className = 'send-btn queued';
        sendBtn.title = 'Send (queued)';
    } else if (!busy && hasText) {
        // Idle, has text → send button
        sendBtn.innerHTML = SEND_ICON;
        sendBtn.className = 'send-btn';
        sendBtn.title = 'Send (Enter)';
    } else {
        // Idle, no text → disabled
        sendBtn.innerHTML = SEND_ICON;
        sendBtn.className = 'send-btn disabled';
        sendBtn.title = '';
    }
}
setBusy(false);

// --- WebSocket ---
function connect() {
    if (!SESSION_ID) {
        const ph = document.createElement('div');
        ph.style.cssText = 'padding:20px;color:var(--muted);text-align:center;';
        ph.textContent = 'No session ID provided.';
        messagesEl.appendChild(ph);
        return;
    }

    const url = `${WS_BASE}/sessions/${SESSION_ID}/stream?source=agent-view`;
    ws = new WebSocket(url);

    ws.onopen = () => {
        retryCount = 0;
        const ph = messagesEl.querySelector('[data-placeholder]');
        if (ph) ph.remove();
        promptEl.focus();
        // Fetch session info for cwd
        const httpBase = WS_BASE.replace('ws://', 'http://').replace('wss://', 'https://');
        fetch(`${httpBase}/sessions/${SESSION_ID}`).then(r => r.json()).then(info => {
            if (info && info.cwd) {
                const cwdEl = welcome.querySelector('.agent-cwd');
                if (cwdEl) cwdEl.textContent = info.cwd.replace(/^\/home\/[^/]+/, '~');
            }
        }).catch(() => {});
    };

    ws.onmessage = (e) => {
        if (typeof e.data !== 'string') return;
        try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'history') {
                const msgs = msg.messages || [];
                _replayingHistory = true;
                for (const m of msgs) renderEvent(m);
                _replayingHistory = false;
                // Scroll to end after replay
                messagesEl.scrollTop = messagesEl.scrollHeight;
                // If the last event was an unanswered question, show the modal now
                const last = msgs[msgs.length - 1];
                if (last && last.type === 'question') {
                    renderEvent(last);
                } else if (last && last.type === 'assistant_message') {
                    const blocks = last.content || [];
                    const lastBlock = blocks[blocks.length - 1];
                    if (lastBlock && lastBlock.type === 'tool_use' && lastBlock.tool === 'AskUserQuestion') {
                        const questions = lastBlock.input.questions || [lastBlock.input];
                        questions.forEach(q => {
                            showQuestionModal(q, (answer) => {
                                promptEl.value = answer;
                                sendPrompt();
                            });
                        });
                    }
                }
            } else if (msg.type === 'ping') {
                return;
            } else {
                renderEvent(msg);
            }
        } catch { /* ignore non-JSON */ }
    };

    ws.onclose = () => {
        ws = null;
        if (retryCount < MAX_RETRIES) {
            retryCount++;
            setTimeout(connect, 3000);
        }
    };

    ws.onerror = () => {};
}

// --- Send prompt ---
function sendPrompt() {
    const text = promptEl.value.trim();
    if (!text && !pendingAttachments.length) return;
    _userDismissedQuestion = true;
    renderEvent({type: 'user_message', content: text || '(attachment)'});
    // Build message before clearing
    const msg = {type: 'prompt', text};
    if (pendingAttachments.length) {
        msg.attachments = pendingAttachments.map(a => ({name: a.name, type: a.type, data: a.data}));
    }
    // Clear input BEFORE setting busy so button shows stop (not orange)
    promptEl.value = '';
    promptEl.style.height = '38px';
    inputArea.style.height = '';
    promptEl.style.maxHeight = '';
    _manualResize = false;
    pendingAttachments.length = 0;
    refreshAttachmentPreview();
    if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify(msg));
        setBusy(true);
    } else {
        renderEvent({type: 'error', error: 'Not connected to agent'});
    }
    promptEl.focus();
}

// --- Input handlers ---
let _manualResize = false;
promptEl.addEventListener('input', () => {
    if (!_manualResize) {
        promptEl.style.height = '38px';
        promptEl.style.height = promptEl.scrollHeight + 'px';
    }
    updateSendBtn();
});

promptEl.addEventListener('keydown', (e) => {
    if (e.key === 'Tab' && e.shiftKey) {
        // Shift+Tab cycles through modes
        e.preventDefault();
        modeIdx = (modeIdx + 1) % MODES.length;
        updateModeUI();
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'set_mode', mode: MODES[modeIdx].value}));
        }
        return;
    }
    if (e.key === 'Escape' && busy) {
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'interrupt'}));
        }
        return;
    }
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        const hasText = promptEl.value.trim().length > 0;
        if (busy && !hasText) {
            // Enter with empty input while busy = stop
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify({type: 'interrupt'}));
            }
        } else if (hasText) {
            sendPrompt();
        }
    }
});

sendBtn.addEventListener('click', () => {
    const hasText = promptEl.value.trim().length > 0;
    if (!busy && !hasText) return; // disabled state — do nothing
    if (busy && !hasText) {
        // Stop
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'interrupt'}));
        }
    } else if (hasText) {
        sendPrompt();
    }
});

// --- Attachments ---
function readAttachmentFile(file) {
    const reader = new FileReader();
    reader.onload = () => {
        const base64 = reader.result.split(',')[1];
        pendingAttachments.push({
            name: file.name,
            type: file.type || 'application/octet-stream',
            data: base64,
            preview: file.type && file.type.startsWith('image/') ? reader.result : null,
        });
        refreshAttachmentPreview();
    };
    reader.readAsDataURL(file);
}

function refreshAttachmentPreview() {
    attachPreview.innerHTML = '';
    if (!pendingAttachments.length) { attachPreview.style.display = 'none'; return; }
    attachPreview.style.display = 'flex';
    pendingAttachments.forEach((att, idx) => {
        const item = document.createElement('div');
        item.className = 'attachment-item';
        if (att.preview) {
            const img = document.createElement('img');
            img.src = att.preview;
            img.alt = att.name;
            item.appendChild(img);
        }
        const nameSpan = document.createElement('span');
        nameSpan.textContent = att.name;
        item.appendChild(nameSpan);
        const removeBtn = document.createElement('button');
        removeBtn.className = 'remove-btn';
        removeBtn.innerHTML = '&times;';
        removeBtn.addEventListener('click', () => {
            pendingAttachments.splice(idx, 1);
            refreshAttachmentPreview();
        });
        item.appendChild(removeBtn);
        attachPreview.appendChild(item);
    });
}

attachBtn.addEventListener('click', () => {
    if (ideBridge.pickFile !== ideBridge.__noop) {
        ideBridge.pickFile();
    } else {
        fileInput.click();
    }
});
// Mark the default no-ops so we can detect IDE availability
ideBridge.__noop = ideBridge.pickFile;

fileInput.addEventListener('change', () => {
    if (!fileInput.files) return;
    for (const file of fileInput.files) readAttachmentFile(file);
    fileInput.value = '';
});

// IDE bridge file callback
ideBridge._onFileData = (data) => {
    if (data.base64 && data.name) {
        pendingAttachments.push({
            name: data.name,
            type: data.type || 'application/octet-stream',
            data: data.base64,
            preview: data.type && data.type.startsWith('image/') ? `data:${data.type};base64,${data.base64}` : null,
        });
        refreshAttachmentPreview();
    }
};

// --- Drag and drop ---
let dragCounter = 0;
inputArea.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragCounter++;
    inputArea.classList.add('drag-over');
});
inputArea.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) { inputArea.classList.remove('drag-over'); dragCounter = 0; }
});
inputArea.addEventListener('dragover', (e) => e.preventDefault());
inputArea.addEventListener('drop', (e) => {
    e.preventDefault();
    inputArea.classList.remove('drag-over');
    dragCounter = 0;
    if (e.dataTransfer && e.dataTransfer.files) {
        for (const file of e.dataTransfer.files) readAttachmentFile(file);
    }
});

];
const EFFORTS = ['low', 'medium', 'high'];
let modeIdx = 0;

// Build popup
const popupHeader = document.createElement('div');
popupHeader.style.cssText = 'padding:8px 14px;font-size:12px;color:var(--muted);font-weight:600;';
popupHeader.textContent = 'Modes';
modePopup.appendChild(popupHeader);

MODES.forEach((m, idx) => {
    const item = document.createElement('div');
    item.className = 'mode-item' + (idx === modeIdx ? ' active' : '');
    item.innerHTML = `
        <div style="color:var(--muted);flex-shrink:0;margin-top:2px;">${m.icon}</div>
        <div style="flex:1;">
            <div style="font-size:13px;color:#e0e0e0;font-weight:500;">${m.label}</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">${m.desc}</div>
        </div>
        <div class="mode-check" style="color:#4a6cf7;flex-shrink:0;margin-top:2px;display:${idx === modeIdx ? 'block' : 'none'};">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 8l3.5 3.5L13 5"/></svg>
        </div>`;
    item.addEventListener('click', () => {
        modeIdx = idx;
        updateModeUI();
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'set_mode', mode: m.value}));
        }
        modePopup.style.display = 'none';
    });
    modePopup.appendChild(item);
});

const sep = document.createElement('div');
sep.style.cssText = 'height:1px;background:#30363d;margin:6px 0;';
modePopup.appendChild(sep);

const effortRow = document.createElement('div');
effortRow.style.cssText = 'padding:8px 14px;display:flex;align-items:center;gap:10px;';
effortRow.innerHTML = `
    <div style="color:var(--muted);flex-shrink:0;">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12V10M6 12V7M9 12V5M12 12V3"/></svg>
    </div>
    <div style="flex:1;font-size:13px;color:#e0e0e0;">Effort</div>`;
const effortToggle = document.createElement('div');
effortToggle.className = 'effort-toggle';
EFFORTS.forEach((e, idx) => {
    const btn = document.createElement('button');
    btn.className = 'effort-btn' + (idx === effortIdx ? ' active' : '');
    btn.textContent = e.charAt(0).toUpperCase();
    btn.title = e.charAt(0).toUpperCase() + e.slice(1) + ' effort';
    btn.addEventListener('click', () => {
        effortIdx = idx;
        updateEffortUI();
        if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({type: 'set_effort', effort: EFFORTS[idx]}));
        }
    });
    effortToggle.appendChild(btn);
});
effortRow.appendChild(effortToggle);
modePopup.appendChild(effortRow);

function updateModeUI() {
    const items = modePopup.querySelectorAll('.mode-item');
    items.forEach((item, i) => {
        item.className = 'mode-item' + (i === modeIdx ? ' active' : '');
        const check = item.querySelector('.mode-check');
        if (check) check.style.display = i === modeIdx ? 'block' : 'none';
    });
    const m = MODES[modeIdx];
    modeBtn.innerHTML = m.icon.replace('width="16"', 'width="14"').replace('height="16"', 'height="14"') + ' <span>' + m.label.split(' ').pop() + '</span>';
}

function updateEffortUI() {
    const btns = effortToggle.children;
    for (let i = 0; i < btns.length; i++) {
        btns[i].className = 'effort-btn' + (i === effortIdx ? ' active' : '');
    }
}

updateModeUI();

modeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    modePopup.style.display = modePopup.style.display === 'none' ? 'block' : 'none';
});
document.addEventListener('click', () => { modePopup.style.display = 'none'; });
modePopup.addEventListener('click', (e) => e.stopPropagation());

// --- Drag handle (resize input area) ---
dragHandle.addEventListener('mousedown', (e) => {
    e.preventDefault();
    const startY = e.clientY;
    const startH = inputArea.offsetHeight;
    _manualResize = true;
    const onMove = (ev) => {
        const h = Math.max(60, startH + (startY - ev.clientY));
        inputArea.style.height = h + 'px';
        promptEl.style.maxHeight = (h - 50) + 'px';
        promptEl.style.height = (h - 50) + 'px';
    };
    const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
    };
    document.addEventListener('mousemove', onMove);
    document.addEventListener('mouseup', onUp);
});
</script>
</body>
</html>
